<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresar — Project Control Center</title>
  <script>(function(){var saved=localStorage.getItem('pcc_theme');var t=saved?saved:(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="src/css/main.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .login-wrap    { width: 100%; max-width: 380px; }
    .login-header  { text-align: center; margin-bottom: 24px; }
    .login-logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      border-radius: var(--radius-lg);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -.5px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px color-mix(in srgb, var(--primary) 30%, transparent);
    }
    .login-app-name { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .login-app-sub  { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .login-card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 28px;
    }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 9px 12px; font-size: 14px; font-family: inherit;
      border: 1px solid var(--line); border-radius: var(--radius-sm);
      outline: none; transition: border-color .15s, box-shadow .15s;
      color: var(--text); background: var(--card2); box-sizing: border-box;
    }
    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 15%, transparent);
    }
    .btn-login {
      width: 100%; padding: 10px; font-family: inherit; font-size: 14px; font-weight: 600;
      border: none; background: var(--primary); color: #fff;
      border-radius: var(--radius-sm); cursor: pointer; transition: background .15s; margin-top: 4px;
    }
    .btn-login:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-login:disabled { opacity: .6; cursor: default; }
    .alert-err {
      margin-top: 14px; padding: 10px 14px;
      background: #fef2f2; border: 1px solid color-mix(in srgb, var(--danger) 30%, transparent);
      border-radius: var(--radius-sm); color: var(--danger); font-size: 13px;
    }
    .login-footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); }
    .login-footer a { cursor: pointer; color: var(--muted); }
    .login-footer a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <div class="login-logo-icon">PCC</div>
      <div class="login-app-name">Project Control Center</div>
      <div class="login-app-sub">Gestión de Proyectos · Luquin</div>
    </div>
    <div class="login-card">
      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" name="email"
                 placeholder="usuario@empresa.com" autocomplete="email" autofocus />
        </div>
        <div class="field">
          <label for="login-pwd">Contraseña</label>
          <input type="password" id="login-pwd" name="password"
                 placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login" id="btn-login">Ingresar</button>
      </form>
      <div class="alert-err" id="login-err" hidden></div>
    </div>
    <div class="login-footer">
      Herramienta interna — acceso restringido<br />
      <a onclick="_configApi()">Configurar URL de API</a>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    // Redirigir si ya hay sesión válida
    if (SESSION.isLoggedIn()) window.location.href = 'index.html';

    function _configApi() {
      const v = prompt('URL del Web App de Apps Script (vacío = modo demo):', CFG.apiUrl);
      if (v !== null) { CFG.apiUrl = v.trim(); location.reload(); }
    }

    const form  = document.getElementById('loginForm');
    const errEl = document.getElementById('login-err');
    const btn   = document.getElementById('btn-login');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      errEl.hidden = true;

      // Modo demo: entrar directo sin backend.
      if (CFG.isMock()) { window.location.href = 'index.html'; return; }

      const email    = document.getElementById('login-email').value.trim().toLowerCase();
      const password = document.getElementById('login-pwd').value;
      if (!email || !password) {
        errEl.textContent = 'Completá los dos campos.';
        errEl.hidden = false;
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Verificando…';
      try {
        const password_hash = await sha256(password);
        const res = await fetch(CFG.apiUrl, {
          method: 'POST',
          body: JSON.stringify({ action: 'login', email: email, password_hash: password_hash }),
        });
        if (!res.ok) throw new Error('Error de conexión (' + res.status + ').');
        const json = await res.json();
        if (!json.ok) throw new Error(json.error || 'Credenciales incorrectas.');
        setSession({ session_token: json.session_token, usuario: json.usuario, permisos: json.permisos, expira_en: json.expira_en });
        window.location.href = 'index.html';
      } catch (e2) {
        errEl.textContent = e2.message || 'Error al iniciar sesión. Verificá tu conexión.';
        errEl.hidden = false;
        btn.disabled    = false;
        btn.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
