<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuarios — Project Control Center</title>
  <script>(function(){var t=localStorage.getItem('pcc_theme')==='dark'?'dark':'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="../../src/css/main.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">PCC</span>
        <span><span class="brand-name">Control Center</span><br /><span class="brand-sub">Proyectos</span></span>
      </div>
      <nav class="nav">
        <a class="nav-item" href="../../index.html"><span class="nav-icon">▦</span> Inicio</a>
        <a class="nav-item" href="../proyectos/proyectos.html"><span class="nav-icon">▣</span> Proyectos</a>
        <a class="nav-item" href="../tareas/tareas.html"><span class="nav-icon">☑</span> Tareas</a>
        <a class="nav-item" href="../seguimiento/seguimiento.html"><span class="nav-icon">◎</span> Seguimiento</a>
        <a class="nav-item" href="../reportes/reportes.html"><span class="nav-icon">▤</span> Reportes</a>
        <a class="nav-item active admin-only" href="usuarios.html"><span class="nav-icon">⚇</span> Usuarios</a>
      </nav>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-footer">
        <a class="nav-item" onclick="toggleTheme()"><span class="nav-icon" id="theme-toggle-icon">☀️</span> Tema</a>
      </div>
    </aside>

    <div class="content-area">
      <header class="topbar">
        <div class="topbar-copy"><p class="eyebrow">Administración</p><h1>Usuarios</h1></div>
        <div id="userChip" style="display:flex;gap:8px;align-items:center"></div>
      </header>

      <main class="container">
        <section class="panel">
          <div class="toolbar">
            <input type="search" id="q" placeholder="Buscar usuario…" style="max-width:260px" oninput="render()" />
            <span class="spacer"></span>
            <button class="sm admin-only" onclick="openModal()">+ Nuevo usuario</button>
          </div>
          <div id="statusBar" class="status-bar">Cargando…</div>
          <div class="table-wrap" style="margin-top:12px">
            <table>
              <thead><tr>
                <th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th>
                <th>Último acceso</th><th style="text-align:right">Acciones</th>
              </tr></thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div id="modals"></div>

  <script src="../../config.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../api.js"></script>
  <script>
    let _editId = null;
    const ROLES = [{ id: 1, nombre: 'Admin' }, { id: 2, nombre: 'Agente' }];

    async function load() {
      setStatus('statusBar', 'Cargando…', 'info');
      try {
        STATE.usuarios = await apiGetUsuarios();
        render();
        setStatus('statusBar', STATE.usuarios.length + ' usuarios.', 'success');
      } catch (err) { setStatus('statusBar', 'Error: ' + err.message, 'error'); }
    }

    function filtered() {
      const q = normalizeText(document.getElementById('q').value);
      return (STATE.usuarios || []).filter(function (u) {
        return !q || normalizeText(u.nombre + ' ' + u.email).indexOf(q) !== -1;
      });
    }

    function rolNombre(idRol) {
      const r = ROLES.filter(function (x) { return x.id === Number(idRol); })[0];
      return r ? r.nombre : '—';
    }

    function render() {
      const rows = filtered();
      const tb = document.getElementById('tbody');
      if (!rows.length) { tb.innerHTML = '<tr><td colspan="6" class="empty-row">Sin usuarios</td></tr>'; return; }
      tb.innerHTML = rows.map(function (u) {
        const activo = String(u.activo) === 'SI';
        const rolCls = Number(u.id_rol) === 1 ? 'st-analysis' : 'st-todo';
        return '<tr>' +
          '<td><b>' + escapeHtml(u.nombre || '—') + '</b></td>' +
          '<td>' + escapeHtml(u.email || '—') + '</td>' +
          '<td><span class="badge ' + rolCls + '">' + escapeHtml(rolNombre(u.id_rol)) + '</span></td>' +
          '<td>' + (activo ? '<span class="badge st-done">Activo</span>' : '<span class="badge st-cancel">Inactivo</span>') + '</td>' +
          '<td class="mono">' + (u.ultimo_acceso ? fmtDate(u.ultimo_acceso) : '—') + '</td>' +
          '<td class="row-actions">' +
            '<button class="secondary sm admin-only" onclick="openModal(' + u.id + ')">Editar</button>' +
            '<button class="' + (activo ? 'danger' : 'secondary') + ' sm admin-only" onclick="toggleActivo(' + u.id + ')">' + (activo ? 'Desactivar' : 'Activar') + '</button>' +
          '</td></tr>';
      }).join('');
      restrictWriteIfAgent();
    }

    function openModal(id) {
      _editId = id || null;
      const u = id ? (STATE.usuarios || []).filter(function (x) { return Number(x.id) === Number(id); })[0] : {};
      const opt = ROLES.map(function (r) { return '<option value="' + r.id + '"' + (Number(u.id_rol) === r.id ? ' selected' : '') + '>' + r.nombre + '</option>'; }).join('');
      document.getElementById('modals').innerHTML =
        '<div class="modal-overlay"><div class="modal" style="max-width:420px"><h3>' + (id ? 'Editar' : 'Nuevo') + ' usuario</h3>' +
        '<div class="field"><label>Nombre *</label><input id="m_nombre" value="' + escapeHtml(u.nombre || '') + '"></div>' +
        '<div class="field"><label>Email *</label><input id="m_email" type="email" value="' + escapeHtml(u.email || '') + '"></div>' +
        '<div class="field-row">' +
          '<div class="field"><label>Rol</label><select id="m_rol">' + opt + '</select></div>' +
          '<div class="field"><label>Estado</label><select id="m_activo"><option value="SI"' + (String(u.activo) !== 'NO' ? ' selected' : '') + '>Activo</option><option value="NO"' + (String(u.activo) === 'NO' ? ' selected' : '') + '>Inactivo</option></select></div>' +
        '</div>' +
        '<div class="field"><label>' + (id ? 'Nueva contraseña (dejar vacío para no cambiar)' : 'Contraseña *') + '</label><input id="m_pass" type="password" autocomplete="new-password" placeholder="' + (id ? '••••••' : 'Mínimo 6 caracteres') + '"></div>' +
        '<div id="m_err" class="status-bar error" hidden></div>' +
        '<div class="modal-actions"><button class="secondary" onclick="closeModal()">Cancelar</button>' +
        '<button id="m_save" onclick="save()">Guardar</button></div></div></div>';
    }

    function closeModal() { document.getElementById('modals').innerHTML = ''; }

    async function save() {
      const nombre = document.getElementById('m_nombre').value.trim();
      const email = document.getElementById('m_email').value.trim().toLowerCase();
      const pass = document.getElementById('m_pass').value;
      const err = document.getElementById('m_err');
      const show = function (m) { err.textContent = m; err.hidden = false; };
      err.hidden = true;
      if (!nombre) return show('El nombre es obligatorio.');
      if (!email || email.indexOf('@') === -1) return show('Email inválido.');
      if (!_editId && (!pass || pass.length < 6)) return show('La contraseña debe tener al menos 6 caracteres.');
      if (pass && pass.length < 6) return show('La contraseña debe tener al menos 6 caracteres.');

      const data = {
        nombre: nombre,
        email: email,
        id_rol: Number(document.getElementById('m_rol').value),
        activo: document.getElementById('m_activo').value,
      };
      if (pass) data.password_hash = await sha256(pass);

      const btn = document.getElementById('m_save'); btn.disabled = true;
      try {
        if (_editId) { data.id = _editId; await apiUpdateUsuario(data); } else { await apiCreateUsuario(data); }
        closeModal(); toast('✓', 'Usuario guardado', 'success'); load();
      } catch (e) { btn.disabled = false; show(e.message); }
    }

    async function toggleActivo(id) {
      const u = (STATE.usuarios || []).filter(function (x) { return Number(x.id) === Number(id); })[0];
      if (!u) return;
      const nuevo = String(u.activo) === 'SI' ? 'NO' : 'SI';
      if (!confirm('¿' + (nuevo === 'NO' ? 'Desactivar' : 'Activar') + ' a "' + (u.nombre || u.email) + '"?')) return;
      try { await apiUpdateUsuario({ id: id, activo: nuevo }); toast('✓', 'Usuario actualizado', 'success'); load(); }
      catch (e) { toast('✕', e.message, 'error'); }
    }

    document.addEventListener('DOMContentLoaded', function () {
      initTheme(); requireAdmin(); renderUserChip(); restrictWriteIfAgent(); load();
    });
  </script>
</body>
</html>
