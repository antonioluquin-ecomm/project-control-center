<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tareas — Project Control Center</title>
  <script>(function(){var t=localStorage.getItem('pcc_theme')==='dark'?'dark':'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="../../src/css/main.css" />
  <style>
    /* Sort headers */
    .sort-th { cursor: pointer; user-select: none; white-space: nowrap; }
    .sort-th:hover { background: var(--surface-alt, rgba(0,0,0,.04)); }
    .sort-icon { font-size: 10px; opacity: .5; margin-left: 3px; }

    /* Badge visible sólo para agentes (body.no-edit); admins usan el select */
    .agent-badge { display: none; }
    body.no-edit .agent-badge { display: inline-flex; }

    /* Mini barra de avance */
    .avance-bar { display: flex; align-items: center; gap: 6px; }
    .avance-track { width: 44px; height: 5px; background: var(--border, #ddd); border-radius: 3px; flex-shrink: 0; }
    .avance-fill  { height: 100%; background: var(--success, #0a7040); border-radius: 3px; transition: width .2s; }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">PCC</span>
        <div>
          <div class="brand-name">Control Center</div>
          <div class="brand-meta" id="sidebarVersionBtn" title="Ver historial de cambios">
            <span id="sidebarVersion">v…</span>
            <span>· Proyectos</span>
          </div>
          <div class="sidebar-version-popover" id="versionPopover" style="display:none;"></div>
        </div>
      </div>
      <nav class="nav">
        <a class="nav-item" href="../../index.html"><span class="nav-icon">▦</span> Inicio</a>
        <a class="nav-item" href="../proyectos/proyectos.html"><span class="nav-icon">▣</span> Proyectos</a>
        <a class="nav-item active" href="tareas.html"><span class="nav-icon">☑</span> Tareas</a>
        <a class="nav-item" href="../seguimiento/seguimiento.html"><span class="nav-icon">◎</span> Seguimiento</a>
        <a class="nav-item" href="../reportes/reportes.html"><span class="nav-icon">▤</span> Reportes</a>
        <a class="nav-item" href="../gantt/gantt.html"><span class="nav-icon">▦</span> Gantt</a>
        <a class="nav-item admin-only" href="../admin/usuarios.html"><span class="nav-icon">⚇</span> Usuarios</a>
      </nav>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-footer">
        <a class="nav-item" onclick="toggleTheme()"><span class="nav-icon" id="theme-toggle-icon">☀️</span> Tema</a>
      </div>
    </aside>

    <div class="content-area">
      <header class="topbar">
        <div class="topbar-copy"><p class="eyebrow">Gestión</p><h1>Tareas</h1></div>
        <div id="userChip" style="display:flex;gap:8px;align-items:center"></div>
      </header>

      <main class="container">
        <section class="panel">
          <div class="toolbar">
            <select id="selProyecto" onchange="onProyectoChange()" style="max-width:280px"></select>
            <select id="fEstado" onchange="render()" style="max-width:150px"><option value="">Todos los estados</option></select>
            <select id="fArea"   onchange="render()" style="max-width:130px"><option value="">Todas las áreas</option></select>
            <select id="fTienda" onchange="render()" style="max-width:130px"><option value="">Todas las tiendas</option></select>
            <select id="fResp"   onchange="render()" style="max-width:150px"><option value="">Todos</option></select>
            <input type="search" id="q" placeholder="Buscar tarea…" style="max-width:200px" oninput="render()" />
            <span class="spacer"></span>
            <button class="secondary sm" onclick="exportCSV()">Exportar CSV</button>
            <button class="sm admin-only" onclick="openModal()" id="btnNew">+ Nueva tarea</button>
          </div>
          <div id="statusBar" class="status-bar">Cargando…</div>
          <div class="table-wrap" style="margin-top:12px">
            <table>
              <thead><tr>
                <th class="sort-th" onclick="sortBy('titulo')">Tarea <span class="sort-icon" id="sh_titulo"></span></th>
                <th class="sort-th" onclick="sortBy('tipo')">Tipo <span class="sort-icon" id="sh_tipo"></span></th>
                <th class="sort-th" onclick="sortBy('estado')">Estado <span class="sort-icon" id="sh_estado"></span></th>
                <th class="sort-th" onclick="sortBy('prioridad')">Prioridad <span class="sort-icon" id="sh_prioridad"></span></th>
                <th class="sort-th" onclick="sortBy('responsable')">Responsable <span class="sort-icon" id="sh_responsable"></span></th>
                <th class="sort-th" onclick="sortBy('avance_pct')">Avance <span class="sort-icon" id="sh_avance_pct"></span></th>
                <th class="sort-th" onclick="sortBy('fecha_limite')">Vence <span class="sort-icon" id="sh_fecha_limite"></span></th>
                <th style="text-align:right">Acciones</th>
              </tr></thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div id="modals"></div>

  <script src="../../config.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../api.js"></script>
  <script src="../../actividad.js"></script>
  <script>
    let _editId  = null;
    let _sortCol = null;
    let _sortDir = 1;

    /* ─── Proyecto selector ─────────────────────────────────── */

    function currentProyectoId() { return Number(document.getElementById('selProyecto').value) || null; }

    function qsProyecto() {
      const m = location.search.match(/[?&]proyecto=(\d+)/);
      return m ? Number(m[1]) : null;
    }

    /* ─── Init ──────────────────────────────────────────────── */

    async function init() {
      setStatus('statusBar', 'Cargando…', 'info');
      try {
        await loadUsuariosBasico();
        STATE.proyectos = await apiGetProyectos({});
        const sel = document.getElementById('selProyecto');
        sel.innerHTML = STATE.proyectos.map(function (p) {
          return '<option value="' + p.id + '">' + escapeHtml(p.nombre) + '</option>';
        }).join('');
        const pre = qsProyecto();
        if (pre && STATE.proyectos.some(function (p) { return Number(p.id) === pre; })) sel.value = pre;

        document.getElementById('fEstado').innerHTML =
          '<option value="">Todos los estados</option>' +
          ESTADOS_TAREA.map(function (e) { return '<option>' + e + '</option>'; }).join('');
        document.getElementById('fArea').innerHTML =
          '<option value="">Todas las áreas</option>' +
          AREAS.map(function (a) { return '<option>' + a + '</option>'; }).join('');
        document.getElementById('fTienda').innerHTML =
          '<option value="">Todas las tiendas</option>' +
          TIENDAS.map(function (t) { return '<option>' + t + '</option>'; }).join('');

        await loadTareas();
        if (/[?&]new=1/.test(location.search) && isAdmin()) openModal();
      } catch (err) { setStatus('statusBar', 'Error: ' + err.message, 'error'); }
    }

    function onProyectoChange() { loadTareas(); }

    async function loadTareas() {
      const pid = currentProyectoId();
      if (!pid) {
        setStatus('statusBar', 'No hay proyectos. Creá uno primero.', 'warning');
        document.getElementById('tbody').innerHTML = '';
        return;
      }
      setStatus('statusBar', 'Cargando…', 'info');
      try {
        STATE.tareas = await apiGetTareas({ id_proyecto: pid });
        _rebuildRespFilter();
        render();
        setStatus('statusBar', STATE.tareas.length + ' tareas.', 'success');
      } catch (err) { setStatus('statusBar', 'Error: ' + err.message, 'error'); }
    }

    function _rebuildRespFilter() {
      const names = [];
      STATE.tareas.forEach(function (t) {
        if (t.responsable && names.indexOf(t.responsable) === -1) names.push(t.responsable);
      });
      names.sort(function (a, b) { return a.localeCompare(b); });
      document.getElementById('fResp').innerHTML =
        '<option value="">Todos</option>' +
        names.map(function (n) { return '<option>' + escapeHtml(n) + '</option>'; }).join('');
    }

    /* ─── Sort ──────────────────────────────────────────────── */

    function sortBy(col) {
      if (_sortCol === col) { _sortDir *= -1; }
      else { _sortCol = col; _sortDir = 1; }
      render();
    }

    function _sorted(rows) {
      if (!_sortCol) return rows;
      const col = _sortCol, dir = _sortDir;
      return rows.slice().sort(function (a, b) {
        var va = a[col], vb = b[col];
        if (col === 'avance_pct') {
          return (Number(va || 0) - Number(vb || 0)) * dir;
        }
        if (col === 'fecha_limite') {
          va = va ? new Date(va) : new Date(9e15);
          vb = vb ? new Date(vb) : new Date(9e15);
          return (va - vb) * dir;
        }
        va = String(va || ''); vb = String(vb || '');
        return va.localeCompare(vb, 'es') * dir;
      });
    }

    function _updateSortIcons() {
      var cols = ['titulo', 'tipo', 'estado', 'prioridad', 'responsable', 'avance_pct', 'fecha_limite'];
      cols.forEach(function (c) {
        var el = document.getElementById('sh_' + c);
        if (!el) return;
        el.textContent = c === _sortCol ? (_sortDir === 1 ? '▲' : '▼') : '';
      });
    }

    /* ─── Filter + render ───────────────────────────────────── */

    function filtered() {
      const q    = normalizeText(document.getElementById('q').value);
      const est  = document.getElementById('fEstado').value;
      const area = document.getElementById('fArea').value;
      const tda  = document.getElementById('fTienda').value;
      const resp = document.getElementById('fResp').value;
      const rows = STATE.tareas.filter(function (t) {
        if (est  && t.estado    !== est)  return false;
        if (area && t.area      !== area) return false;
        if (tda  && t.tienda    !== tda)  return false;
        if (resp && t.responsable !== resp) return false;
        if (q && normalizeText(t.titulo + ' ' + (t.descripcion || '') + ' ' + (t.responsable || '')).indexOf(q) === -1) return false;
        return true;
      });
      return _sorted(rows);
    }

    function render() {
      _updateSortIcons();
      const rows = filtered();
      const tb = document.getElementById('tbody');
      if (!rows.length) { tb.innerHTML = '<tr><td colspan="8" class="empty-row">Sin tareas</td></tr>'; return; }

      const estOpts = function (sel) {
        return ESTADOS_TAREA.map(function (e) {
          return '<option' + (e === sel ? ' selected' : '') + '>' + e + '</option>';
        }).join('');
      };

      tb.innerHTML = rows.map(function (t) {
        const cls  = ESTADO_CLASS[t.estado] || 'st-todo';
        const venc = t.vencida ? ' <span class="badge vencida">Vencida</span>' : '';
        const prc  = PRIORIDAD_CLASS[t.prioridad] || '';
        const pct  = Number(t.avance_pct) || 0;

        return '<tr>' +
          '<td><b>' + escapeHtml(t.titulo) + '</b>' + metaChips(t) + linkIcons(t) + '</td>' +
          '<td>' + escapeHtml(t.tipo || '—') + '</td>' +
          '<td>' +
            '<select class="admin-only" style="font-size:11px;padding:4px 8px" onchange="quickEstado(' + t.id + ', this.value)">' + estOpts(t.estado) + '</select>' +
            '<span class="badge ' + cls + ' agent-badge">' + escapeHtml(t.estado) + '</span>' +
            venc +
          '</td>' +
          '<td class="' + prc + '">' + escapeHtml(t.prioridad || '—') + '</td>' +
          '<td>' + escapeHtml(t.responsable || '—') + '</td>' +
          '<td>' +
            '<div class="avance-bar">' +
              '<div class="avance-track"><div class="avance-fill" style="width:' + pct + '%"></div></div>' +
              '<span class="mono" style="font-size:11px">' + pct + '%</span>' +
            '</div>' +
          '</td>' +
          '<td class="mono">' + fmtDate(t.fecha_limite) + '</td>' +
          '<td class="row-actions">' +
            '<button class="secondary sm" onclick="actTarea(' + t.id + ')">Actividad</button>' +
            '<button class="secondary sm admin-only" onclick="openModal(' + t.id + ')">Editar</button>' +
            '<button class="danger sm admin-only" onclick="del(' + t.id + ')">Eliminar</button>' +
          '</td></tr>';
      }).join('');
      restrictWriteIfAgent();
    }

    /* ─── Helpers de render ─────────────────────────────────── */

    function tipoOptions(current) {
      let html = '';
      if (current && TIPOS_TAREA.indexOf(current) === -1) {
        html += '<option value="' + escapeHtml(current) + '" selected>' + escapeHtml(current) + ' (legacy)</option>';
      }
      html += TIPOS_TAREA.map(function (v) {
        return '<option' + (v === current ? ' selected' : '') + '>' + v + '</option>';
      }).join('');
      return html;
    }

    function metaChips(t) {
      let out = '';
      if (t.area)   out += ' <span class="badge st-analysis" style="font-size:10px">' + escapeHtml(t.area) + '</span>';
      if (t.tienda) out += ' <span class="badge st-todo" style="font-size:10px">' + escapeHtml(t.tienda) + '</span>';
      return out;
    }

    function linkIcons(t) {
      const links = [
        { url: t.url_jira, label: 'Jira' },
        { url: t.url_gitlab, label: 'GitLab' },
        { url: t.url_figma_prototipo, label: 'Figma proto' },
        { url: t.url_figma_editable, label: 'Figma edit' },
      ];
      const html = links.filter(function (l) { return l.url; }).map(function (l) {
        return '<a class="link-chip" href="' + escapeHtml(l.url) + '" target="_blank" rel="noopener">↗ ' + escapeHtml(l.label) + '</a>';
      }).join('');
      return html ? '<div class="link-row">' + html + '</div>' : '';
    }

    /* ─── Quick estado inline ───────────────────────────────── */

    async function quickEstado(id, estado) {
      try {
        await apiUpdateTarea({ id: id, estado: estado });
        toast('✓', 'Estado actualizado', 'success');
        loadTareas();
      } catch (e) { toast('✕', e.message, 'error'); }
    }

    /* ─── Export CSV ────────────────────────────────────────── */

    function exportCSV() {
      const rows = [['id', 'titulo', 'tipo', 'estado', 'prioridad', 'responsable', 'area', 'tienda', 'avance_pct', 'fecha_limite', 'url_jira', 'url_gitlab', 'url_figma_prototipo', 'url_figma_editable']];
      filtered().forEach(function (t) {
        rows.push([t.id, t.titulo, t.tipo, t.estado, t.prioridad, t.responsable, t.area, t.tienda, t.avance_pct,
          (t.fecha_limite || '').slice(0, 10), t.url_jira, t.url_gitlab, t.url_figma_prototipo, t.url_figma_editable]);
      });
      downloadCSV('tareas.csv', rows);
    }

    /* ─── Modal ABM ─────────────────────────────────────────── */

    function openModal(id) {
      const pid = currentProyectoId();
      if (!pid) { toast('⚠', 'Seleccioná un proyecto primero', 'error'); return; }
      _editId = id || null;
      const t   = id ? STATE.tareas.filter(function (x) { return Number(x.id) === Number(id); })[0] : {};
      const opt = function (arr, sel) {
        return arr.map(function (v) { return '<option' + (v === sel ? ' selected' : '') + '>' + v + '</option>'; }).join('');
      };
      document.getElementById('modals').innerHTML =
        '<div class="modal-overlay"><div class="modal"><h3>' + (id ? 'Editar' : 'Nueva') + ' tarea</h3>' +
        '<div class="field"><label>Título *</label><input id="m_tit" value="' + escapeHtml(t.titulo || '') + '"></div>' +
        '<div class="field"><label>Descripción</label><textarea id="m_desc">' + escapeHtml(t.descripcion || '') + '</textarea></div>' +
        '<div class="field-row">' +
          '<div class="field"><label>Tipo</label><select id="m_tipo">' + tipoOptions(t.tipo || 'Tarea') + '</select></div>' +
          '<div class="field"><label>Estado</label><select id="m_estado">' + opt(ESTADOS_TAREA, t.estado || 'Por Hacer') + '</select></div>' +
        '</div>' +
        '<div class="field-row">' +
          '<div class="field"><label>Prioridad</label><select id="m_prio">' + opt(PRIORIDADES, t.prioridad || 'Medium') + '</select></div>' +
          '<div class="field"><label>Responsable</label><select id="m_resp">' + responsableOptions(t.responsable || '') + '</select></div>' +
        '</div>' +
        '<div class="field-row">' +
          '<div class="field"><label>Fecha inicio</label><input id="m_ini" type="date" value="' + (t.fecha_inicio || '').slice(0, 10) + '"></div>' +
          '<div class="field"><label>Fecha límite</label><input id="m_lim" type="date" value="' + (t.fecha_limite || '').slice(0, 10) + '"></div>' +
        '</div>' +
        '<div class="field"><label>Avance (%)</label><input id="m_av" type="number" min="0" max="100" value="' + (t.avance_pct || 0) + '"></div>' +
        '<div class="field-row">' +
          '<div class="field"><label>Área responsable</label><select id="m_area" onchange="toggleAreaLinks()"><option value="">—</option>' + opt(AREAS, t.area || '') + '</select></div>' +
          '<div class="field"><label>Tienda</label><select id="m_tienda"><option value="">—</option>' + opt(TIENDAS, t.tienda || '') + '</select></div>' +
        '</div>' +
        '<div id="m_jira_wrap" class="field" hidden><label>Enlace Jira (Infracommerce)</label><input id="m_jira" type="url" placeholder="https://…" value="' + escapeHtml(t.url_jira || '') + '"></div>' +
        '<div id="m_gitlab_wrap" class="field" hidden><label>Enlace GitLab (PIM)</label><input id="m_gitlab" type="url" placeholder="https://…" value="' + escapeHtml(t.url_gitlab || '') + '"></div>' +
        '<div class="field-row">' +
          '<div class="field"><label>Figma — prototipo</label><input id="m_figp" type="url" placeholder="https://…" value="' + escapeHtml(t.url_figma_prototipo || '') + '"></div>' +
          '<div class="field"><label>Figma — editable</label><input id="m_fige" type="url" placeholder="https://…" value="' + escapeHtml(t.url_figma_editable || '') + '"></div>' +
        '</div>' +
        '<div id="m_err" class="status-bar error" hidden></div>' +
        '<div class="modal-actions">' +
          '<button class="secondary" onclick="closeModal()">Cancelar</button>' +
          '<button id="m_save" onclick="save()">Guardar</button>' +
        '</div></div></div>';
      toggleAreaLinks();
      const firstInput = document.getElementById('m_tit');
      if (firstInput) firstInput.focus();
    }

    function toggleAreaLinks() {
      const area = document.getElementById('m_area').value;
      document.getElementById('m_jira_wrap').hidden   = (area !== 'InfraCommerce');
      document.getElementById('m_gitlab_wrap').hidden = (area !== 'PIM');
    }

    function closeModal() { document.getElementById('modals').innerHTML = ''; }

    async function save() {
      const titulo = document.getElementById('m_tit').value.trim();
      const err    = document.getElementById('m_err');
      if (!titulo) { err.textContent = 'El título es obligatorio.'; err.hidden = false; return; }
      const data = {
        id_proyecto:          currentProyectoId(),
        titulo:               titulo,
        descripcion:          document.getElementById('m_desc').value.trim(),
        tipo:                 document.getElementById('m_tipo').value,
        estado:               document.getElementById('m_estado').value,
        prioridad:            document.getElementById('m_prio').value,
        responsable:          document.getElementById('m_resp').value.trim(),
        fecha_inicio:         document.getElementById('m_ini').value,
        fecha_limite:         document.getElementById('m_lim').value,
        avance_pct:           parseInt(document.getElementById('m_av').value, 10) || 0,
        area:                 document.getElementById('m_area').value,
        tienda:               document.getElementById('m_tienda').value,
        url_jira:             document.getElementById('m_jira').value.trim(),
        url_gitlab:           document.getElementById('m_gitlab').value.trim(),
        url_figma_prototipo:  document.getElementById('m_figp').value.trim(),
        url_figma_editable:   document.getElementById('m_fige').value.trim(),
      };
      const btn = document.getElementById('m_save'); btn.disabled = true;
      try {
        if (_editId) { data.id = _editId; await apiUpdateTarea(data); } else { await apiCreateTarea(data); }
        closeModal(); toast('✓', 'Tarea guardada', 'success'); loadTareas();
      } catch (e) { btn.disabled = false; err.textContent = e.message; err.hidden = false; }
    }

    /* ─── Actividad + eliminar ──────────────────────────────── */

    function actTarea(id) {
      const t = STATE.tareas.filter(function (x) { return Number(x.id) === Number(id); })[0];
      openActividad('TAREA', id, t ? t.titulo : ('Tarea #' + id));
    }

    async function del(id) {
      const t = STATE.tareas.filter(function (x) { return Number(x.id) === Number(id); })[0];
      if (!confirm('¿Eliminar la tarea "' + (t ? t.titulo : id) + '"? (soft delete)')) return;
      try { await apiDeleteTarea(id); toast('✓', 'Tarea cancelada', 'success'); loadTareas(); }
      catch (e) { toast('✕', e.message, 'error'); }
    }

    /* ─── Boot ──────────────────────────────────────────────── */

    document.addEventListener('DOMContentLoaded', function () {
      initTheme(); initVersionBadge(); requireAuth(); renderUserChip(); restrictWriteIfAgent(); init();
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
