  <style>
    /* Sort headers */
    .sort-th { cursor: pointer; user-select: none; white-space: nowrap; }
    .sort-th:hover { background: var(--surface-alt, rgba(0,0,0,.04)); }
    .sort-icon { font-size: 10px; opacity: .5; margin-left: 3px; }

    /* Badge visible sólo para agentes (body.no-edit); admins usan el select */
    .agent-badge { display: none; }
    body.no-edit .agent-badge { display: inline-flex; }

    /* Filas de tarea: título y chips en líneas separadas (no mezclados en un mismo
       flujo de texto) para que el alto de fila crezca de forma predecible. */
    .tarea-title { font-weight: 600; }
    .tarea-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }

    /* Mini barra de avance */
    .avance-bar { display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: center; gap: 6px; min-width: 0; }
    .avance-track { width: 44px; height: 5px; background: var(--border, #ddd); border-radius: 3px; min-width: 0; overflow: hidden; }
    .avance-fill  { height: 100%; background: var(--success, #0a7040); border-radius: 3px; transition: width .2s; }

    /* Secciones colapsables (sprint / backlog) */
    .sprint-group { border: 1px solid var(--border, #ddd); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
    .sprint-group + .sprint-group { margin-top: 10px; }
    .sprint-group summary {
      cursor: pointer; user-select: none; list-style: none;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; background: var(--surface-alt, rgba(0,0,0,.03));
      font-weight: 600;
    }
    .sprint-group summary::-webkit-details-marker { display: none; }
    .sprint-group summary::before { content: '▶'; font-size: 10px; opacity: .6; transition: transform .15s; }
    .sprint-group[open] summary::before { transform: rotate(90deg); }
    .sprint-group summary .group-count { font-weight: 400; opacity: .65; font-size: 12px; }
    .sprint-group .table-wrap { margin: 0; }
    .sprint-group table { min-width: 0; }

    /* Selector de vista (lista / kanban) */
    .view-tabs { display: inline-flex; border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden; background: var(--card); }
    .view-tab { background: transparent; color: var(--muted); border: 0; border-radius: 0; padding: 6px 12px; font-size: 12.5px; }
    .view-tab:hover { background: var(--card2); transform: none; }
    .view-tab.active { background: var(--primary); color: #fff; }

    /* Kanban del sprint activo */
    .kanban-board { display: grid; grid-auto-flow: column; grid-auto-columns: 254px; grid-template-columns: none; gap: 10px; align-items: start; overflow-x: auto; overflow-y: visible; padding-bottom: 10px; overscroll-behavior-x: contain; }
    .kanban-col { border: 1px solid var(--line); border-radius: 8px; background: var(--card2); min-width: 254px; overflow: hidden; }
    .kanban-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--line); background: var(--card); font-size: 12.5px; font-weight: 700; }
    .kanban-count { font-family: var(--mono); font-size: 11px; color: var(--muted); font-weight: 500; }
    .kanban-list { display: grid; gap: 8px; padding: 10px; min-height: 76px; }
    .kanban-empty { color: var(--muted); font-size: 12px; padding: 8px 2px; }
    .kanban-card { border: 1px solid var(--line); border-radius: 8px; background: var(--card); padding: 10px; cursor: pointer; transition: border-color .15s, box-shadow .15s, transform .1s; overflow: hidden; }
    .kanban-card:hover { border-color: var(--primary-mid); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
    .kanban-title { font-size: 13px; font-weight: 700; line-height: 1.3; margin-bottom: 7px; }
    .kanban-meta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; margin-bottom: 7px; }
    .kanban-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 11.5px; }
    .kanban-actions { display: flex; gap: 6px; margin-top: 8px; }
    @media (max-width: 700px) { .kanban-board { grid-auto-columns: minmax(238px, 82vw); } .kanban-col { min-width: 238px; } }
  </style>
</head>

  <script>
    let _editId  = null;
    let _editOriginalEstado = null;
    let _editSprintId = null;
    let _cerrarSprintId = null;
    let _cloneSourceId = null;
    let _editReturnToDetailId = null;
    let _sortCol = null;
    let _sortDir = 1;
    let _taskView = 'list';

    /* ─── Proyecto selector ─────────────────────────────────── */

    function currentProyectoId() { return Number(document.getElementById('selProyecto').value) || null; }

    function proyNombre(id) {
      const p = (STATE.proyectos || []).filter(function (x) { return Number(x.id) === Number(id); })[0];
      return p ? p.nombre : ('#' + id);
    }

    function qsProyecto() {
      const m = location.search.match(/[?&]proyecto=(\d+)/);
      return m ? Number(m[1]) : null;
    }

    /* ─── Filtros: persistencia en localStorage ─────────────── */
    // Se guardan los filtros elegidos (no el proyecto, que ya se persiste vía ?proyecto=
    // y localStorage propio) para no tener que re-armarlos en cada recarga.
    const FILTROS_KEY = 'pcc_tareas_filtros';
    const FILTRO_IDS  = ['fEstado', 'fTipo', 'fPrio', 'fArea', 'fTienda', 'fResp', 'q'];

    function _loadSavedFiltros() {
      try { return JSON.parse(localStorage.getItem(FILTROS_KEY) || '{}'); } catch (e) { return {}; }
    }

    function _saveFiltros() {
      const data = {};
      FILTRO_IDS.forEach(function (id) { data[id] = document.getElementById(id).value; });
      localStorage.setItem(FILTROS_KEY, JSON.stringify(data));
    }

    // Restaura el valor guardado en un <select>/<input> si sigue siendo una opción válida.
    function _restoreFiltro(id, saved) {
      const el = document.getElementById(id);
      if (!el || !saved || saved[id] === undefined) return;
      if (el.tagName === 'INPUT') { el.value = saved[id]; return; }
      if (Array.prototype.some.call(el.options, function (o) { return o.value === saved[id]; })) {
        el.value = saved[id];
      }
    }

    // Como los filtros persisten entre sesiones, hace falta que sea obvio cuando
    // hay alguno activo (si no, "faltan tareas" se lee como un bug en vez de un filtro viejo).
    function _updateFiltrosIndicator() {
      const n = FILTRO_IDS.filter(function (id) { return document.getElementById(id).value; }).length;
      const btn = document.getElementById('btnLimpiarFiltros');
      btn.style.display = n ? '' : 'none';
      btn.textContent = 'Limpiar filtros (' + n + ')';
    }

    function limpiarFiltros() {
      FILTRO_IDS.forEach(function (id) { document.getElementById(id).value = ''; });
      render();
    }

    /* ─── Init ──────────────────────────────────────────────── */

    async function init() {
      setStatus('statusBar', 'Cargando…', 'info');
      try {
        await loadCatalogos();
        await loadUsuariosBasico();
        STATE.proyectos = await apiGetProyectos({});
        STATE.sprints    = await apiGetSprints({});
        STATE.allSprints = await apiGetSprints({ incluir_cancelados: true });
        const sel = document.getElementById('selProyecto');
        sel.innerHTML = '<option value="">Todos los proyectos</option>' +
          STATE.proyectos.map(function (p) {
            return '<option value="' + p.id + '">' + escapeHtml(p.nombre) + '</option>';
          }).join('');
        const pre = qsProyecto();
        if (pre && STATE.proyectos.some(function (p) { return Number(p.id) === pre; })) sel.value = pre;

        document.getElementById('fEstado').innerHTML =
          '<option value="">Todos los estados</option>' +
          cat('estados_tarea', ESTADOS_TAREA).map(function (e) { return '<option>' + e + '</option>'; }).join('');
        document.getElementById('fTipo').innerHTML =
          '<option value="">Todos los tipos</option>' +
          cat('tipos_tarea', TIPOS_TAREA).map(function (v) { return '<option>' + v + '</option>'; }).join('');
        document.getElementById('fPrio').innerHTML =
          '<option value="">Todas las prioridades</option>' +
          cat('prioridades', PRIORIDADES).map(function (v) { return '<option>' + v + '</option>'; }).join('');
        document.getElementById('fArea').innerHTML =
          '<option value="">Todas las áreas</option>' +
          cat('areas', AREAS).map(function (a) { return '<option>' + a + '</option>'; }).join('');
        document.getElementById('fTienda').innerHTML =
          '<option value="">Todas las tiendas</option>' +
          cat('tiendas', TIENDAS).map(function (t) { return '<option>' + t + '</option>'; }).join('');

        const savedFiltros = _loadSavedFiltros();
        ['fEstado', 'fTipo', 'fPrio', 'fArea', 'fTienda', 'q'].forEach(function (id) { _restoreFiltro(id, savedFiltros); });

        await loadTareas();
        if (/[?&]new=1/.test(location.search) && isAdmin()) openModal();
        // Deep-link desde una notificación: ?tarea=<id> abre el detalle.
        const mT = location.search.match(/[?&]tarea=(\d+)/);
        if (mT) {
          const tid = Number(mT[1]);
          if (!STATE.tareas.some(function (x) { return Number(x.id) === tid; })) {
            STATE.tareas = await apiGetTareas({ incluir_canceladas: true });
          }
          openDetalle(tid);
        }
      } catch (err) { setStatus('statusBar', 'Error: ' + err.message, 'error'); }
    }

    // Atajo: filtra por el usuario logueado como responsable.
    function misTareas() {
      const nombre = SESSION.usuario && SESSION.usuario.nombre;
      if (!nombre) { toast('⚠', 'No se pudo identificar el usuario logueado', 'error'); return; }
      const sel = document.getElementById('fResp');
      sel.value = nombre;
      if (sel.value !== nombre) { toast('⚠', 'No hay tareas asignadas a "' + nombre + '" en esta vista', 'error'); return; }
      render();
    }

    function onProyectoChange() { loadTareas(); }

    // Trae todas las tareas del proyecto (sprints + backlog); el agrupado en secciones
    // colapsables es responsabilidad de _buildGroups()/render().
    async function loadTareas() {
      const pid = currentProyectoId();
      const btnNew = document.getElementById('btnNew');
      if (btnNew) btnNew.disabled = !pid;
      setStatus('statusBar', 'Cargando…', 'info');
      try {
        STATE.tareas = await apiGetTareas(pid ? { id_proyecto: pid } : {});
        _rebuildRespFilter();
        render();
        const ocultas = STATE.tareas.filter(function (t) { return ESTADOS_TAREA_CERRADOS.indexOf(t.estado) !== -1; }).length;
        const msg = STATE.tareas.length + ' tareas.' +
          (ocultas ? ' (' + ocultas + ' finalizadas/canceladas ocultas — elegí un estado para verlas)' : '');
        setStatus('statusBar', msg, 'success');
      } catch (err) { setStatus('statusBar', 'Error: ' + err.message, 'error'); }
    }

    function _rebuildRespFilter() {
      const el = document.getElementById('fResp');
      // Conserva la selección actual (o la guardada en localStorage la primera vez) si
      // sigue siendo una opción válida tras reconstruir la lista de responsables.
      const wanted = el.value || _loadSavedFiltros().fResp || '';
      const names = [];
      STATE.tareas.forEach(function (t) {
        if (t.responsable && names.indexOf(t.responsable) === -1) names.push(t.responsable);
      });
      names.sort(function (a, b) { return a.localeCompare(b); });
      el.innerHTML =
        '<option value="">Todos los resp.</option>' +
        names.map(function (n) { return '<option>' + escapeHtml(n) + '</option>'; }).join('');
      if (wanted && names.indexOf(wanted) !== -1) el.value = wanted;
    }

    /* ─── Sprints (helpers) ─────────────────────────────────── */

    function _sprintById(id) {
      if (!id) return null;
      return (STATE.sprints || []).filter(function (s) { return Number(s.id) === Number(id); })[0] || null;
    }

    // <option> para el <select> de sprint en el form de tarea ("Sin sprint" + sprints).
    // `orphan`: sprint actual de la tarea cuando ya no está en STATE.sprints (p.ej. cancelado) —
    // se incluye igual para no perderlo silenciosamente al guardar sin tocar este campo.
    function _sprintOptions(current, orphan) {
      let html = '<option value="">Sin sprint</option>';
      if (orphan && Number(orphan.id) === Number(current)) {
        html += '<option value="' + orphan.id + '" selected>' + escapeHtml(orphan.nombre) + ' (cancelado)</option>';
      }
      html += (STATE.sprints || []).map(function (s) {
        return '<option value="' + s.id + '"' + (Number(current) === Number(s.id) ? ' selected' : '') + '>' + escapeHtml(s.nombre) + '</option>';
      }).join('');
      return html;
    }

    // Chip con el nombre del sprint (clase de color por estado).
    function _sprintChip(id, fontSize) {
      const s = _sprintById(id);
      if (!s) return '';
      const cls = (typeof ESTADO_CLASS_SPRINT !== 'undefined' && ESTADO_CLASS_SPRINT[s.estado]) || 'st-todo';
      return '<span class="badge ' + cls + '" style="font-size:' + (fontSize || '10px') + '">🏃 ' + escapeHtml(s.nombre) + '</span>';
    }

    /* ─── Sort ──────────────────────────────────────────────── */

    function sortBy(col) {
      if (_sortCol === col) { _sortDir *= -1; }
      else { _sortCol = col; _sortDir = 1; }
      render();
    }

    function _sorted(rows) {
      if (!_sortCol) return rows;
      const col = _sortCol, dir = _sortDir;
      return rows.slice().sort(function (a, b) {
        var va = a[col], vb = b[col];
        if (col === 'avance_pct') {
          return (Number(va || 0) - Number(vb || 0)) * dir;
        }
        if (col === 'fecha_limite') {
          va = va ? new Date(va) : new Date(9e15);
          vb = vb ? new Date(vb) : new Date(9e15);
          return (va - vb) * dir;
        }
        va = String(va || ''); vb = String(vb || '');
        return va.localeCompare(vb, 'es') * dir;
      });
    }

    function _updateSortIcons() {
      document.querySelectorAll('.sort-icon').forEach(function (el) {
        var c = el.getAttribute('data-col');
        el.textContent = c === _sortCol ? (_sortDir === 1 ? '▲' : '▼') : '';
      });
    }

    /* ─── Secciones colapsables (sprint / backlog) ──────────── */

    // Persiste en localStorage si una sección quedó abierta o cerrada, por proyecto.
    function _sectionStorageKey(pid, key) { return 'pcc_tareas_open_' + (pid || 'all') + '_' + key; }

    function _isSectionOpen(pid, key, defaultOpen) {
      const v = localStorage.getItem(_sectionStorageKey(pid, key));
      return v === null ? defaultOpen : v === '1';
    }

    function _onGroupToggle(details) {
      _setSectionOpen(currentProyectoId(), details.getAttribute('data-key'), details.open);
    }

    function _setSectionOpen(pid, key, open) {
      localStorage.setItem(_sectionStorageKey(pid, key), open ? '1' : '0');
    }

    function toggleAllGroups() {
      const groups = document.querySelectorAll('#groupsContainer > .sprint-group');
      const expand = document.getElementById('btnToggleAll').textContent === 'Expandir todo';
      groups.forEach(function (g) {
        g.open = expand;
        _setSectionOpen(currentProyectoId(), g.getAttribute('data-key'), expand);
      });
      document.getElementById('btnToggleAll').textContent = expand ? 'Colapsar todo' : 'Expandir todo';
    }

    // Reparte las tareas (ya filtradas/ordenadas) en secciones: cada sprint con tareas
    // (Activo/Planificado primero, Cerrado/Cancelado al final) y Backlog siempre al final.
    // Usa STATE.allSprints (incluye Cancelado) para que una tarea que sigue apuntando a un
    // sprint cancelado no desaparezca silenciosamente del listado (STATE.sprints, usado en
    // el gestor y en el <select> del modal, sigue ocultando los cancelados a propósito).
    function _buildGroups(rows) {
      const order = { 'Activo': 0, 'Planificado': 1, 'Cerrado': 2, 'Cancelado': 2 };
      const sprints = (STATE.allSprints || []).slice().sort(function (a, b) {
        const oa = order[a.estado] != null ? order[a.estado] : 3;
        const ob = order[b.estado] != null ? order[b.estado] : 3;
        if (oa !== ob) return oa - ob;
        return String(a.fecha_inicio || '').localeCompare(String(b.fecha_inicio || ''));
      });
      const groups = sprints.map(function (s) {
        return {
          key: 'sprint-' + s.id, title: s.nombre, estado: s.estado, isSprint: true,
          tasks: rows.filter(function (t) { return Number(t.id_sprint) === Number(s.id); }),
        };
      }).filter(function (g) { return g.tasks.length; });
      groups.push({
        key: 'backlog', title: 'Backlog', estado: null, isSprint: false,
        tasks: rows.filter(function (t) { return !t.id_sprint; }),
      });
      return groups.filter(function (g) { return g.tasks.length; });
    }

    function _groupTableHead() {
      return '<thead><tr>' +
        '<th class="sort-th" onclick="sortBy(\'titulo\')">Tarea <span class="sort-icon" data-col="titulo"></span></th>' +
        '<th class="sort-th" onclick="sortBy(\'tipo\')">Tipo <span class="sort-icon" data-col="tipo"></span></th>' +
        '<th class="sort-th" onclick="sortBy(\'estado\')">Estado <span class="sort-icon" data-col="estado"></span></th>' +
        '<th class="sort-th" onclick="sortBy(\'prioridad\')">Prioridad <span class="sort-icon" data-col="prioridad"></span></th>' +
        '<th class="sort-th" onclick="sortBy(\'responsable\')">Responsable <span class="sort-icon" data-col="responsable"></span></th>' +
        '<th class="sort-th" onclick="sortBy(\'avance_pct\')">Avance <span class="sort-icon" data-col="avance_pct"></span></th>' +
        '<th class="sort-th" onclick="sortBy(\'fecha_limite\')">Vence <span class="sort-icon" data-col="fecha_limite"></span></th>' +
        '<th style="text-align:right">Acciones</th>' +
      '</tr></thead>';
    }

    function setTaskView(view) {
      _taskView = view === 'kanban' ? 'kanban' : 'list';
      render();
    }

    function _updateViewTabs() {
      const isKanban = _taskView === 'kanban';
      document.getElementById('viewListBtn').classList.toggle('active', !isKanban);
      document.getElementById('viewKanbanBtn').classList.toggle('active', isKanban);
      document.getElementById('btnToggleAll').style.display = isKanban ? 'none' : '';
    }

    function _activeSprint() {
      const activos = (STATE.sprints || []).filter(function (s) { return s.estado === 'Activo'; });
      activos.sort(function (a, b) { return String(a.fecha_inicio || '').localeCompare(String(b.fecha_inicio || '')); });
      return activos[0] || null;
    }

    function _kanbanStatuses(rows) {
      const used = {};
      rows.forEach(function (t) { if (t.estado) used[t.estado] = true; });
      return cat('estados_tarea', ESTADOS_TAREA).filter(function (estado) {
        return ESTADOS_TAREA_CERRADOS.indexOf(estado) === -1 || used[estado];
      });
    }

    function _renderKanbanCard(t) {
      const prc = PRIORIDAD_CLASS[t.prioridad] || '';
      const pct = Number(t.avance_pct) || 0;
      const chips = metaChips(t);
      return '<article class="kanban-card" onclick="openDetalle(' + t.id + ')">' +
        '<div class="kanban-title">' + escapeHtml(t.titulo) + '</div>' +
        '<div class="kanban-meta">' +
          (t.tipo ? '<span class="badge" style="font-size:10px;background:var(--card2);border:1px solid var(--line);color:var(--text2)">' + escapeHtml(t.tipo) + '</span>' : '') +
          (t.prioridad ? '<span class="badge ' + prc + '" style="font-size:10px">' + escapeHtml(t.prioridad) + '</span>' : '') +
          (chips || '') +
        '</div>' +
        '<div class="avance-bar" style="margin-bottom:7px">' +
          '<div class="avance-track"><div class="avance-fill" style="width:' + pct + '%"></div></div>' +
          '<span class="mono" style="font-size:11px">' + pct + '%</span>' +
        '</div>' +
        '<div class="kanban-foot"><span>' + escapeHtml(t.responsable || 'Sin responsable') + '</span><span class="mono">' + fmtDate(t.fecha_limite) + '</span></div>' +
        '<div class="kanban-actions compact-actions admin-only" onclick="event.stopPropagation()">' +
          '<button class="action-icon" onclick="openModal(' + t.id + ')" title="Editar tarea" aria-label="Editar ' + escapeHtml(t.titulo) + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/></svg></button>' +
          '<button class="action-icon" onclick="openCloneModal(' + t.id + ')" title="Clonar tarea" aria-label="Clonar ' + escapeHtml(t.titulo) + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg></button>' +
          '<button class="action-icon danger" onclick="del(' + t.id + ')" title="Cancelar tarea" aria-label="Cancelar ' + escapeHtml(t.titulo) + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></button>' +
        '</div>' +
      '</article>';
    }

    function _renderKanban(rows) {
      const sprint = _activeSprint();
      const container = document.getElementById('groupsContainer');
      if (!sprint) {
        container.innerHTML = '<div class="empty-row" style="padding:24px;text-align:center">No hay sprint activo para mostrar en Kanban.</div>';
        return;
      }
      const sprintRows = rows.filter(function (t) { return Number(t.id_sprint) === Number(sprint.id); });
      if (!sprintRows.length) {
        container.innerHTML = '<div class="empty-row" style="padding:24px;text-align:center">Sin tareas en el sprint activo: ' + escapeHtml(sprint.nombre) + '</div>';
        return;
      }
      const statuses = _kanbanStatuses(sprintRows);
      const board = statuses.map(function (estado) {
        const tasks = sprintRows.filter(function (t) { return t.estado === estado; });
        const cls = ESTADO_CLASS[estado] || 'st-todo';
        return '<section class="kanban-col">' +
          '<div class="kanban-head"><span class="badge ' + cls + '" style="font-size:10px">' + escapeHtml(estado) + '</span><span class="kanban-count">' + tasks.length + '</span></div>' +
          '<div class="kanban-list">' + (tasks.length ? tasks.map(_renderKanbanCard).join('') : '<div class="kanban-empty">Sin tareas</div>') + '</div>' +
        '</section>';
      }).join('');
      container.innerHTML =
        '<div class="status-bar info" style="margin-bottom:10px">Sprint activo: <b>' + escapeHtml(sprint.nombre) + '</b> - ' + sprintRows.length + ' tarea' + (sprintRows.length === 1 ? '' : 's') + '</div>' +
        '<div class="kanban-board">' + board + '</div>';
      restrictWriteIfAgent();
    }
    /* ─── Filter + render ───────────────────────────────────── */

    // Sin un estado puntual elegido, el board oculta Finalizada/Cancelada por defecto
    // (tareas ya cerradas — el lugar para revisarlas cross-proyecto es Seguimiento).
    // Eligiendo ese estado en #fEstado se ven igual, agrupadas por su sprint/backlog.
    function filtered() {
      const q    = normalizeText(document.getElementById('q').value);
      const est  = document.getElementById('fEstado').value;
      const tipo = document.getElementById('fTipo').value;
      const prio = document.getElementById('fPrio').value;
      const area = document.getElementById('fArea').value;
      const tda  = document.getElementById('fTienda').value;
      const resp = document.getElementById('fResp').value;
      const rows = STATE.tareas.filter(function (t) {
        if (!est && ESTADOS_TAREA_CERRADOS.indexOf(t.estado) !== -1) return false;
        if (est  && t.estado    !== est)  return false;
        if (tipo && t.tipo      !== tipo) return false;
        if (prio && t.prioridad !== prio) return false;
        if (area && t.area      !== area) return false;
        if (tda  && t.tienda    !== tda)  return false;
        if (resp && t.responsable !== resp) return false;
        if (q && normalizeText(t.titulo + ' ' + (t.descripcion || '') + ' ' + (t.responsable || '')).indexOf(q) === -1) return false;
        return true;
      });
      return _sorted(rows);
    }

    function render() {
      _saveFiltros();
      _updateFiltrosIndicator();
      _updateViewTabs();
      const rows = filtered();

      if (_taskView === 'kanban') {
        _renderKanban(rows);
        return;
      }

      const pid = currentProyectoId();
      const groups = _buildGroups(rows);
      const container = document.getElementById('groupsContainer');

      if (!groups.length) {
        container.innerHTML = '<div class="empty-row" style="padding:24px;text-align:center">Sin tareas</div>';
        _updateSortIcons();
        return;
      }

      container.innerHTML = groups.map(function (g) {
        const defaultOpen = g.isSprint && g.estado === 'Activo';
        const open = _isSectionOpen(pid, g.key, defaultOpen);
        const badge = g.isSprint
          ? '<span class="badge ' + ((typeof ESTADO_CLASS_SPRINT !== 'undefined' && ESTADO_CLASS_SPRINT[g.estado]) || 'st-todo') + '" style="font-size:10px">' + escapeHtml(g.estado) + '</span>'
          : '';
        return '<details class="sprint-group" data-key="' + g.key + '"' + (open ? ' open' : '') + ' ontoggle="_onGroupToggle(this)">' +
          '<summary>' + escapeHtml(g.title) + badge + '<span class="group-count">' + g.tasks.length + ' tarea' + (g.tasks.length === 1 ? '' : 's') + '</span></summary>' +
          '<div class="table-wrap"><table>' + _groupTableHead() + '<tbody>' + _renderRows(g.tasks) + '</tbody></table></div>' +
        '</details>';
      }).join('');
      _updateSortIcons();
      restrictWriteIfAgent();
    }
    /* ─── Helpers de render ─────────────────────────────────── */

    function tipoOptions(current) {
      const tipos = cat('tipos_tarea', TIPOS_TAREA);
      let html = '';
      if (current && tipos.indexOf(current) === -1) {
        html += '<option value="' + escapeHtml(current) + '" selected>' + escapeHtml(current) + ' (legacy)</option>';
      }
      html += tipos.map(function (v) {
        return '<option' + (v === current ? ' selected' : '') + '>' + v + '</option>';
      }).join('');
      return html;
    }

    function _renderRows(tasks) {
      const estOpts = function (sel) {
        return cat('estados_tarea', ESTADOS_TAREA).map(function (e) {
          return '<option' + (e === sel ? ' selected' : '') + '>' + e + '</option>';
        }).join('');
      };

      return tasks.map(function (t) {
        const cls  = ESTADO_CLASS[t.estado] || 'st-todo';
        const venc = t.vencida ? ' <span class="badge vencida">Vencida</span>' : '';
        const prc  = PRIORIDAD_CLASS[t.prioridad] || '';
        const pct  = Number(t.avance_pct) || 0;

        const chips = metaChips(t);
        return '<tr onclick="openDetalle(' + t.id + ')" style="cursor:pointer">' +
          '<td><div class="tarea-title">' + escapeHtml(t.titulo) + '</div>' +
            (chips ? '<div class="tarea-chips">' + chips + '</div>' : '') +
            linkIcons(t) +
          '</td>' +
          '<td>' + escapeHtml(t.tipo || '—') + '</td>' +
          '<td onclick="event.stopPropagation()">' +
            '<select class="admin-only" style="font-size:11px;padding:4px 8px" onchange="quickEstado(' + t.id + ', this.value)">' + estOpts(t.estado) + '</select>' +
            '<span class="badge ' + cls + ' agent-badge">' + escapeHtml(t.estado) + '</span>' +
            venc +
          '</td>' +
          '<td class="' + prc + '">' + escapeHtml(t.prioridad || '—') + '</td>' +
          '<td onclick="event.stopPropagation()">' +
            '<select class="admin-only" style="font-size:11px;padding:4px 8px" onchange="quickResp(' + t.id + ', this.value)">' + responsableOptions(t.responsable || '') + '</select>' +
            '<span class="agent-badge">' + escapeHtml(t.responsable || '—') + '</span>' +
          '</td>' +
          '<td>' +
            '<div class="avance-bar">' +
              '<div class="avance-track"><div class="avance-fill" style="width:' + pct + '%"></div></div>' +
              '<span class="mono" style="font-size:11px">' + pct + '%</span>' +
            '</div>' +
          '</td>' +
          '<td class="mono">' + fmtDate(t.fecha_limite) + '</td>' +
          '<td class="row-actions compact-actions" onclick="event.stopPropagation()">' +
            '<button class="action-icon admin-only" onclick="openModal(' + t.id + ')" title="Editar tarea" aria-label="Editar ' + escapeHtml(t.titulo) + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/></svg></button>' +
            '<button class="action-icon admin-only" onclick="openCloneModal(' + t.id + ')" title="Clonar tarea" aria-label="Clonar ' + escapeHtml(t.titulo) + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg></button>' +
            '<button class="action-icon danger admin-only" onclick="del(' + t.id + ')" title="Cancelar tarea" aria-label="Cancelar ' + escapeHtml(t.titulo) + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></button>' +
          '</td></tr>';
      }).join('');
    }

    function metaChips(t) {
      let out = '';
      // Sin proyecto seleccionado, el board mezcla tareas de todos: se aclara de cuál es cada una.
      if (!currentProyectoId()) out += '<span class="badge chip-proyecto" style="font-size:10px">📁 ' + escapeHtml(proyNombre(t.id_proyecto)) + '</span>';
      if (t.area)   out += '<span class="badge st-analysis" style="font-size:10px">' + escapeHtml(t.area) + '</span>';
      if (t.tienda) out += '<span class="badge st-todo" style="font-size:10px">' + escapeHtml(t.tienda) + '</span>';
      return out;
    }

    function linkIcons(t) {
      const links = [
        { url: t.url_jira, label: 'Jira' },
        { url: t.url_gitlab, label: 'GitLab' },
        { url: t.url_figma_prototipo, label: 'Figma proto' },
        { url: t.url_figma_editable, label: 'Figma edit' },
        { url: t.url_informe_gestion, label: 'Informe gestion' },
      ];
      const html = links.filter(function (l) { return l.url; }).map(function (l) {
        return '<a class="link-chip" href="' + escapeHtml(l.url) + '" target="_blank" rel="noopener">↗ ' + escapeHtml(l.label) + '</a>';
      }).join('');
      return html ? '<div class="link-row" onclick="event.stopPropagation()">' + html + '</div>' : '';
    }

    /* ─── Quick estado inline ───────────────────────────────── */

    async function quickEstado(id, estado) {
      const t = STATE.tareas.filter(function (x) { return Number(x.id) === Number(id); })[0];
      const data = { id: id, estado: estado };
      if (t && t.estado === 'Documentaci\u00f3n' && estado === 'Finalizada') {
        toast('!', 'Primero debe pasar a Revisi\u00f3n', 'error');
        loadTareas();
        return;
      }
      if (t && t.estado === 'Documentaci\u00f3n' && estado === 'Revisi\u00f3n' && !t.url_informe_gestion) {
        const url = prompt('URL del informe de gestion del portal ecommerce');
        if (!url) { loadTareas(); return; }
        data.url_informe_gestion = url.trim();
      }
      try {
        await apiUpdateTarea(data);
        toast('OK', 'Estado actualizado', 'success');
        loadTareas();
      } catch (e) { toast('!', e.message, 'error'); loadTareas(); }
    }

    async function quickResp(id, responsable) {
      try {
        await apiUpdateTarea({ id: id, responsable: responsable });
        toast('✓', 'Responsable actualizado', 'success');
        loadTareas();
      } catch (e) { toast('✕', e.message, 'error'); loadTareas(); }
    }

    /* ─── Export CSV ────────────────────────────────────────── */

    function _csvRows(list) {
      const rows = [['id', 'titulo', 'tipo', 'estado', 'prioridad', 'responsable', 'sprint', 'area', 'tienda', 'avance_pct', 'fecha_limite', 'url_jira', 'url_gitlab', 'url_figma_prototipo', 'url_figma_editable', 'url_informe_gestion']];
      list.forEach(function (t) {
        const s = _sprintById(t.id_sprint);
        rows.push([t.id, t.titulo, t.tipo, t.estado, t.prioridad, t.responsable,
          s ? s.nombre : '', t.area, t.tienda, t.avance_pct,
          (t.fecha_limite || '').slice(0, 10), t.url_jira, t.url_gitlab, t.url_figma_prototipo, t.url_figma_editable, t.url_informe_gestion]);
      });
      return rows;
    }

    function exportCSV() {
      downloadCSV('tareas.csv', _csvRows(filtered()));
    }

    // Exporta todas las tareas del proyecto ya cargadas en memoria, ignorando los filtros activos.
    function exportAllCSV() {
      downloadCSV('tareas_todas.csv', _csvRows(STATE.tareas));
      setStatus('statusBar', 'Exportado: ' + STATE.tareas.length + ' tareas (todas).', 'success');
    }

    /* ─── Modal ABM ─────────────────────────────────────────── */

    function _cloneDescription(t) {
      const base = String(t.descripcion || '').trim();
      const note = 'Clonada desde tarea #' + t.id + ': ' + (t.titulo || '');
      const suffix = (base ? '\n\n---\n' : '') + note;
      if ((base + suffix).length <= 4000) return base + suffix;
      return note + '\n\n' + base.slice(0, Math.max(0, 4000 - note.length - 2));
    }

    function _cloneDefaults(t) {
      return Object.assign({}, t, {
        id: null,
        titulo: t.titulo || '',
        descripcion: _cloneDescription(t),
        estado: 'Por Hacer',
        avance_pct: 0,
      });
    }

    function openCloneModal(id) {
      openModal(id, { clone: true });
    }

    function cancelTaskEdit() {
      const detailId = _editReturnToDetailId;
      _editReturnToDetailId = null;
      _cloneSourceId = null;
      if (detailId) { openDetalle(detailId); return; }
      closeModal();
    }

    async function openModal(id, opts) {
      opts = opts || {};
      const pid = currentProyectoId();
      if (!id && !pid) { toast('!', 'Selecciona un proyecto primero', 'error'); return; }
      const isClone = !!opts.clone;
      _editId = isClone ? null : (id || null);
      _editOriginalEstado = null;
      _cloneSourceId = null;
      _editReturnToDetailId = opts.detailEdit && id && !isClone ? Number(id) : null;
      const source = id ? STATE.tareas.filter(function (x) { return Number(x.id) === Number(id); })[0] : {};
      if (id && !source) { toast('!', 'Tarea no encontrada', 'error'); return; }
      const t = isClone ? _cloneDefaults(source) : source;
      _editOriginalEstado = t.estado || null;
      if (isClone) _cloneSourceId = Number(source.id);
      // Si la tarea tiene un sprint que ya no figura en STATE.sprints (p.ej. cancelado), lo
      // resolvemos aparte para poder seguir mostrándolo en el <select> y no perder la asignación.
      let orphanSprint = null;
      if (t.id_sprint && !_sprintById(t.id_sprint)) {
        try { orphanSprint = await apiGetSprint(t.id_sprint); } catch (e) { /* sprint inexistente: se deja sin sprint */ }
      }
      const opt = function (arr, sel) {
        return arr.map(function (v) { return '<option' + (v === sel ? ' selected' : '') + '>' + v + '</option>'; }).join('');
      };
      const checkboxes = function (arr, csv, cls) {
        const sel = String(csv || '').split(',').map(function (s) { return s.trim(); }).filter(Boolean);
        return arr.map(function (v) {
          return '<label style="display:flex;align-items:flex-start;gap:6px;font-size:13px;width:130px;min-width:130px">' +
            '<input type="checkbox" class="' + cls + '" value="' + v + '"' + (sel.indexOf(v) !== -1 ? ' checked' : '') + ' style="margin-top:2px" /><span>' + escapeHtml(v) + '</span>' +
            '</label>';
        }).join('');
      };
      const proyOptions = (STATE.proyectos || []).map(function (p) {
        return '<option value="' + p.id + '"' + (Number(p.id) === Number(t.id_proyecto || pid) ? ' selected' : '') + '>' + escapeHtml(p.nombre) + '</option>';
      }).join('');
      const modeTitle = isClone ? 'Clonar tarea' : (id ? 'Editar tarea' : 'Nueva tarea');
      const saveLabel = id && !isClone ? 'Guardar cambios' : 'Crear tarea';
      document.getElementById('modals').innerHTML =
        '<div class="modal-overlay"><div class="modal td-modal td-edit-modal">' +
        '<div class="td-header-top">' +
          '<span class="badge ' + (ESTADO_CLASS[t.estado] || 'st-todo') + '">' + escapeHtml(t.estado || 'Por Hacer') + '</span>' +
          '<div class="td-header-actions">' +
            '<button class="secondary sm" onclick="cancelTaskEdit()">X</button>' +
          '</div>' +
        '</div>' +
        '<h3 class="td-title">' + modeTitle + '</h3>' +
        (isClone ? '<div class="status-bar info" style="margin-bottom:14px">Se va a crear una tarea nueva copiando la informacion de #' + escapeHtml(source.id) + '. Podes cambiar tienda, titulo o descripcion antes de guardar.</div>' : '') +
        '<div class="td-edit-form">' +
          '<section class="td-edit-section"><div class="td-edit-section-title">Identidad</div>' +
            '<div class="field"><label>Proyecto *</label><select id="m_proy">' + proyOptions + '</select></div>' +
            '<div class="field"><label>Titulo *</label><input id="m_tit" value="' + escapeHtml(t.titulo || '') + '"></div>' +
            '<div class="field"><label>Descripcion</label><textarea id="m_desc" class="td-edit-desc" placeholder="# Titulo&#10;## Subtitulo&#10;- vineta">' + escapeHtml(t.descripcion || '') + '</textarea></div>' +
          '</section>' +
          '<section class="td-edit-section"><div class="td-edit-section-title">Gestion</div>' +
            '<div class="field-row">' +
              '<div class="field"><label>Tipo</label><select id="m_tipo">' + tipoOptions(t.tipo || 'Tarea') + '</select></div>' +
              '<div class="field"><label>Estado</label><select id="m_estado" onchange="toggleInformeGestion()">' + opt(cat('estados_tarea', ESTADOS_TAREA), t.estado || 'Por Hacer') + '</select></div>' +
            '</div>' +
            '<div class="field"><label>Sprint</label><select id="m_sprint">' + _sprintOptions(t.id_sprint, orphanSprint) + '</select></div>' +
            '<div class="field-row">' +
              '<div class="field"><label>Area responsable</label><select id="m_area" onchange="toggleAreaLinks()"><option value="">-</option>' + opt(cat('areas', AREAS), t.area || '') + '</select></div>' +
              '<div class="field"><label>Responsable</label><select id="m_resp">' + responsableOptions(t.responsable || '') + '</select></div>' +
            '</div>' +
            '<div class="field-row">' +
              '<div class="field"><label>Prioridad</label><select id="m_prio">' + opt(cat('prioridades', PRIORIDADES), t.prioridad || 'Medium') + '</select></div>' +
              '<div class="field"><label>Avance (%)</label><input id="m_av" type="number" min="0" max="100" value="' + (t.avance_pct || 0) + '"></div>' +
            '</div>' +
            '<div class="field-row">' +
              '<div class="field"><label>Fecha inicio</label><input id="m_ini" type="date" value="' + (t.fecha_inicio || '').slice(0, 10) + '"></div>' +
              '<div class="field"><label>Fecha limite</label><input id="m_lim" type="date" value="' + (t.fecha_limite || '').slice(0, 10) + '"></div>' +
            '</div>' +
          '</section>' +
          '<section class="td-edit-section"><div class="td-edit-section-title">Alcance</div>' +
            '<div class="field"><label>Tienda</label><select id="m_tienda"><option value="">-</option>' + opt(cat('tiendas', TIENDAS), t.tienda || '') + '</select></div>' +
            '<div class="field"><label>Sección</label><div style="display:flex;gap:14px;flex-wrap:wrap">' + checkboxes(cat('secciones', SECCIONES), t.seccion, 'm_seccion') + '</div></div>' +
            '<div class="field"><label>Dispositivos</label><div style="display:flex;gap:14px;flex-wrap:wrap">' + checkboxes(DISPOSITIVOS, t.dispositivos, 'm_dispositivos') + '</div></div>' +
            '<div id="m_jira_wrap" class="field" hidden><label>Enlace Jira (Infracommerce)</label><input id="m_jira" type="url" placeholder="https://..." value="' + escapeHtml(t.url_jira || '') + '"></div>' +
            '<div id="m_gitlab_wrap" class="field" hidden><label>Enlace GitLab (PIM)</label><input id="m_gitlab" type="url" placeholder="https://..." value="' + escapeHtml(t.url_gitlab || '') + '"></div>' +
          '</section>' +
          '<section class="td-edit-section"><div class="td-edit-section-title">Links</div>' +
            '<div class="field-row">' +
              '<div class="field"><label>Figma - prototipo</label><input id="m_figp" type="url" placeholder="https://..." value="' + escapeHtml(t.url_figma_prototipo || '') + '"></div>' +
              '<div class="field"><label>Figma - editable</label><input id="m_fige" type="url" placeholder="https://..." value="' + escapeHtml(t.url_figma_editable || '') + '"></div>' +
            '</div>' +
            '<div id="m_informe_wrap" class="field" hidden><label>Informe de gestion del portal ecommerce</label><input id="m_informe" type="url" placeholder="https://..." value="' + escapeHtml(t.url_informe_gestion || '') + '"></div>' +
            '<div id="m_err" class="status-bar error" hidden></div>' +
            '<div class="modal-actions">' +
              '<button class="secondary" onclick="cancelTaskEdit()">Cancelar</button>' +
              '<button id="m_save" onclick="save()">' + saveLabel + '</button>' +
            '</div>' +
          '</section>' +
        '</div></div></div>';
      toggleAreaLinks();
      toggleInformeGestion();
      const firstInput = document.getElementById('m_tit');
      if (firstInput) firstInput.focus();
    }

    function toggleAreaLinks() {
      const area = document.getElementById('m_area').value;
      document.getElementById('m_jira_wrap').hidden   = (area !== 'InfraCommerce');
      document.getElementById('m_gitlab_wrap').hidden = (area !== 'PIM');
    }

    function toggleInformeGestion() {
      const wrap = document.getElementById('m_informe_wrap');
      const input = document.getElementById('m_informe');
      const estadoEl = document.getElementById('m_estado');
      if (!wrap || !input || !estadoEl) return;
      const estado = estadoEl.value;
      wrap.hidden = !(estado === 'Documentaci\u00f3n' || estado === 'Revisi\u00f3n' || input.value.trim());
      input.required = (_editOriginalEstado === 'Documentaci\u00f3n' && estado === 'Revisi\u00f3n');
    }

    function closeModal() { _cloneSourceId = null; _editReturnToDetailId = null; document.getElementById('modals').innerHTML = ''; }

    async function save() {
      const titulo = document.getElementById('m_tit').value.trim();
      const err    = document.getElementById('m_err');
      if (!titulo) { err.textContent = 'El título es obligatorio.'; err.hidden = false; return; }
      const data = {
        id_proyecto:          Number(document.getElementById('m_proy').value),
        titulo:               titulo,
        descripcion:          document.getElementById('m_desc').value.trim(),
        tipo:                 document.getElementById('m_tipo').value,
        estado:               document.getElementById('m_estado').value,
        id_sprint:            document.getElementById('m_sprint').value || '',
        prioridad:            document.getElementById('m_prio').value,
        responsable:          document.getElementById('m_resp').value.trim(),
        fecha_inicio:         document.getElementById('m_ini').value,
        fecha_limite:         document.getElementById('m_lim').value,
        avance_pct:           parseInt(document.getElementById('m_av').value, 10) || 0,
        area:                 document.getElementById('m_area').value,
        tienda:               document.getElementById('m_tienda').value,
        seccion:              Array.prototype.slice.call(document.querySelectorAll('.m_seccion:checked')).map(function (el) { return el.value; }).join(','),
        dispositivos:         Array.prototype.slice.call(document.querySelectorAll('.m_dispositivos:checked')).map(function (el) { return el.value; }).join(','),
        url_jira:             document.getElementById('m_jira').value.trim(),
        url_gitlab:           document.getElementById('m_gitlab').value.trim(),
        url_figma_prototipo:  document.getElementById('m_figp').value.trim(),
        url_figma_editable:   document.getElementById('m_fige').value.trim(),
        url_informe_gestion:  document.getElementById('m_informe').value.trim(),
      };
      if (_editOriginalEstado === 'Documentaci\u00f3n' && data.estado === 'Finalizada') { err.textContent = 'No se puede pasar de Documentaci\u00f3n a Finalizada. Primero debe ir a Revisi\u00f3n.'; err.hidden = false; return; }
      if (_editOriginalEstado === 'Documentaci\u00f3n' && data.estado === 'Revisi\u00f3n' && !data.url_informe_gestion) { err.textContent = 'Para pasar a Revisi\u00f3n carga la URL del informe de gestion del portal ecommerce.'; err.hidden = false; return; }
      const btn = document.getElementById('m_save'); btn.disabled = true;
      try {
        const detailId = _editReturnToDetailId;
        if (_editId) { data.id = _editId; await apiUpdateTarea(data); } else { await apiCreateTarea(data); }
        const wasClone = !!_cloneSourceId;
        _cloneSourceId = null;
        _editReturnToDetailId = null;
        if (detailId) {
          await loadTareas();
          toast('OK', 'Tarea actualizada', 'success');
          openDetalle(detailId);
        } else {
          closeModal(); toast('OK', wasClone ? 'Tarea clonada' : 'Tarea guardada', 'success'); loadTareas();
        }
      } catch (e) { btn.disabled = false; err.textContent = e.message; err.hidden = false; }
    }

    /* ─── Detalle de tarea ──────────────────────────────────── */

    function openDetalle(id) {
      const t = STATE.tareas.filter(function (x) { return Number(x.id) === Number(id); })[0];
      if (!t) return;
      t.nombre_proyecto = proyNombre(t.id_proyecto);
      openTareaDetalleModal(t, {
        onEdit: function () { openModal(id, { detailEdit: true }); },
        onClone: function () { openCloneModal(id); },
      });
    }

    /* ─── Cancelar (soft delete) ────────────────────────────── */

    async function del(id) {
      const t = STATE.tareas.filter(function (x) { return Number(x.id) === Number(id); })[0];
      if (!confirm('¿Cancelar la tarea "' + (t ? t.titulo : id) + '"? Queda marcada como Cancelada, no se borra.')) return;
      try { await apiDeleteTarea(id); toast('✓', 'Tarea cancelada', 'success'); loadTareas(); }
      catch (e) { toast('✕', e.message, 'error'); }
    }

    /* ─── ABM de sprints (gestor) ───────────────────────────── */

    // Recarga sprints y re-renderiza las secciones de tareas.
    async function _refreshSprints() {
      try {
        STATE.sprints    = await apiGetSprints({});
        STATE.allSprints = await apiGetSprints({ incluir_cancelados: true });
      } catch (e) {
        toast('✕', 'No se pudo actualizar sprints: ' + e.message, 'error');
      }
      render();
    }

    function openSprintsManager() {
      const rows = (STATE.sprints || []);
      const body = rows.length ? rows.map(function (s) {
        const cls = (typeof ESTADO_CLASS_SPRINT !== 'undefined' && ESTADO_CLASS_SPRINT[s.estado]) || 'st-todo';
        const rango = (s.fecha_inicio ? fmtDate(s.fecha_inicio) : '—') + ' → ' + (s.fecha_fin ? fmtDate(s.fecha_fin) : '—');
        return '<tr>' +
          '<td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + escapeHtml(s.nombre) + '"><b>' + escapeHtml(s.nombre) + '</b>' + (s.objetivo ? '<div class="text-muted" style="font-size:11px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + escapeHtml(s.objetivo) + '">' + escapeHtml(s.objetivo) + '</div>' : '') + '</td>' +
          '<td><span class="badge ' + cls + '">' + escapeHtml(s.estado) + '</span></td>' +
          '<td class="mono" style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + rango + '</td>' +
          '<td><div class="row-actions compact-actions">' +
            '<button class="action-icon admin-only" onclick="openSprintForm(' + s.id + ')" title="Editar sprint" aria-label="Editar ' + escapeHtml(s.nombre) + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/></svg></button>' +
            (s.estado === 'Activo' ? '<button class="secondary sm admin-only" onclick="openCerrarSprint(' + s.id + ')">Cerrar</button>' : '') +
            '<button class="action-icon danger admin-only" onclick="delSprint(' + s.id + ')" title="Cancelar sprint" aria-label="Cancelar ' + escapeHtml(s.nombre) + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></button>' +
          '</div></td></tr>';
      }).join('') : '<tr><td colspan="4" class="empty-row">Sin sprints todavía.</td></tr>';

      document.getElementById('modals').innerHTML =
        '<div class="modal-overlay"><div class="modal" style="max-width:820px">' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">' +
          '<h3 style="margin:0">Sprints</h3>' +
          '<button class="sm admin-only" style="margin-left:auto" onclick="openSprintForm()">+ Nuevo sprint</button>' +
        '</div>' +
        '<div class="table-wrap"><table style="table-layout:fixed;width:100%;min-width:0">' +
          '<colgroup><col style="width:34%"><col style="width:14%"><col style="width:22%"><col style="width:30%"></colgroup>' +
          '<thead><tr><th>Sprint</th><th>Estado</th><th>Rango</th><th style="text-align:right">Acciones</th></tr></thead>' +
          '<tbody>' + body + '</tbody>' +
        '</table></div>' +
        '<div class="modal-actions"><button class="secondary" onclick="closeModal()">Cerrar</button></div>' +
        '</div></div>';
      restrictWriteIfAgent();
    }

    function openSprintForm(id) {
      _editSprintId = id || null;
      const s = id ? (STATE.sprints.filter(function (x) { return Number(x.id) === Number(id); })[0] || {}) : {};
      const opt = function (arr, sel) {
        return arr.map(function (v) { return '<option' + (v === sel ? ' selected' : '') + '>' + v + '</option>'; }).join('');
      };
      document.getElementById('modals').innerHTML =
        '<div class="modal-overlay"><div class="modal"><h3>' + (id ? 'Editar' : 'Nuevo') + ' sprint</h3>' +
        '<div class="field"><label>Nombre *</label><input id="s_nom" value="' + escapeHtml(s.nombre || '') + '"></div>' +
        '<div class="field"><label>Objetivo</label><textarea id="s_obj">' + escapeHtml(s.objetivo || '') + '</textarea></div>' +
        '<div class="field-row">' +
          '<div class="field"><label>Estado</label><select id="s_estado">' + opt(cat('estados_sprint', ESTADOS_SPRINT), s.estado || 'Planificado') + '</select></div>' +
          '<div class="field"><label>&nbsp;</label><div></div></div>' +
        '</div>' +
        '<div class="field-row">' +
          '<div class="field"><label>Fecha inicio</label><input id="s_ini" type="date" value="' + (s.fecha_inicio || '').slice(0, 10) + '"></div>' +
          '<div class="field"><label>Fecha fin</label><input id="s_fin" type="date" value="' + (s.fecha_fin || '').slice(0, 10) + '"></div>' +
        '</div>' +
        '<div id="s_err" class="status-bar error" hidden></div>' +
        '<div class="modal-actions">' +
          '<button class="secondary" onclick="openSprintsManager()">Cancelar</button>' +
          '<button id="s_save" onclick="saveSprint()">Guardar</button>' +
        '</div></div></div>';
      const first = document.getElementById('s_nom');
      if (first) first.focus();
    }

    async function saveSprint() {
      const nombre = document.getElementById('s_nom').value.trim();
      const err    = document.getElementById('s_err');
      if (!nombre) { err.textContent = 'El nombre es obligatorio.'; err.hidden = false; return; }
      const ini = document.getElementById('s_ini').value;
      const fin = document.getElementById('s_fin').value;
      if (ini && fin && fin < ini) { err.textContent = 'La fecha fin no puede ser anterior al inicio.'; err.hidden = false; return; }
      const data = {
        nombre:       nombre,
        objetivo:     document.getElementById('s_obj').value.trim(),
        estado:       document.getElementById('s_estado').value,
        fecha_inicio: ini,
        fecha_fin:    fin,
      };
      const btn = document.getElementById('s_save'); btn.disabled = true;
      try {
        if (_editSprintId) { data.id = _editSprintId; await apiUpdateSprint(data); } else { await apiCreateSprint(data); }
        toast('✓', 'Sprint guardado', 'success');
        await _refreshSprints();
        openSprintsManager();
      } catch (e) { btn.disabled = false; err.textContent = e.message; err.hidden = false; }
    }

    async function delSprint(id) {
      const s = STATE.sprints.filter(function (x) { return Number(x.id) === Number(id); })[0];
      if (!confirm('¿Cancelar el sprint "' + (s ? s.nombre : id) + '"? Las tareas asignadas quedan sin sprint en el filtro. (soft delete)')) return;
      try {
        await apiDeleteSprint(id);
        toast('✓', 'Sprint cancelado', 'success');
        await _refreshSprints();
        openSprintsManager();
      } catch (e) { toast('✕', e.message, 'error'); }
    }

    // Cerrar sprint: al terminar, decide qué hacer con las tareas que quedaron abiertas.
    async function openCerrarSprint(id) {
      const s = (STATE.sprints || []).filter(function (x) { return Number(x.id) === Number(id); })[0];
      if (!s) return;
      _cerrarSprintId = id;
      document.getElementById('modals').innerHTML =
        '<div class="modal-overlay"><div class="modal"><h3>Cerrar sprint</h3>' +
        '<div class="status-bar">Revisando tareas del sprint…</div></div></div>';

      let pendientes = [];
      try {
        const tareas = await apiGetTareas({ id_sprint: id });
        pendientes = tareas.filter(function (t) { return ESTADOS_TAREA_CERRADOS.indexOf(t.estado) === -1; });
      } catch (e) { toast('✕', e.message, 'error'); openSprintsManager(); return; }

      // Otros sprints abiertos como posible destino de las tareas pendientes.
      const otros = (STATE.sprints || []).filter(function (x) {
        return Number(x.id) !== Number(id) && ESTADOS_SPRINT_CERRADOS.indexOf(x.estado) === -1;
      });
      const otrosOpts = otros.map(function (x) { return '<option value="' + x.id + '">' + escapeHtml(x.nombre) + '</option>'; }).join('');
      const n = pendientes.length;

      const infoTareas = n === 0
        ? '<div class="status-bar success">Todas las tareas del sprint están finalizadas o canceladas. Se cerrará sin mover nada.</div>'
        : '<div class="status-bar">Este sprint tiene <b>' + n + '</b> tarea' + (n === 1 ? '' : 's') + ' sin finalizar. ¿Qué hacés con ella' + (n === 1 ? '' : 's') + '?</div>' +
          '<div class="field" style="margin-top:10px">' +
            '<label style="display:flex;gap:8px;align-items:center;font-weight:400;margin-bottom:8px"><input type="radio" name="destino" value="backlog" checked onchange="_cerrarSprintToggle()"> Mover al Backlog (sin sprint)</label>' +
            (otros.length ? '<label style="display:flex;gap:8px;align-items:center;font-weight:400;margin-bottom:8px"><input type="radio" name="destino" value="otro" onchange="_cerrarSprintToggle()"> Mover a otro sprint</label>' +
              '<select id="cs_destino" disabled style="margin:0 0 8px 26px;max-width:280px">' + otrosOpts + '</select>' : '') +
            '<label style="display:flex;gap:8px;align-items:center;font-weight:400"><input type="radio" name="destino" value="keep" onchange="_cerrarSprintToggle()"> Dejarlas en este sprint (quedan bajo el sprint cerrado)</label>' +
          '</div>';

      document.getElementById('modals').innerHTML =
        '<div class="modal-overlay"><div class="modal"><h3>Cerrar sprint “' + escapeHtml(s.nombre) + '”</h3>' +
        infoTareas +
        '<div id="cs_err" class="status-bar error" hidden></div>' +
        '<div class="modal-actions">' +
          '<button class="secondary" onclick="openSprintsManager()">Cancelar</button>' +
          '<button id="cs_save" onclick="cerrarSprint()">Cerrar sprint</button>' +
        '</div></div></div>';
      restrictWriteIfAgent();
    }

    function _cerrarSprintToggle() {
      const sel = document.getElementById('cs_destino');
      if (!sel) return;
      const val = (document.querySelector('input[name="destino"]:checked') || {}).value;
      sel.disabled = (val !== 'otro');
    }

    async function cerrarSprint() {
      const id = _cerrarSprintId;
      const checked = document.querySelector('input[name="destino"]:checked');
      // Sin tareas pendientes no hay radios: se cierra dejando todo como está.
      let destino = 'keep';
      if (checked) {
        destino = checked.value === 'otro' ? document.getElementById('cs_destino').value : checked.value;
      }
      const btn = document.getElementById('cs_save'); if (btn) btn.disabled = true;
      try {
        const r = await apiCloseSprint({ id: id, destino_tareas: destino });
        const movidas = (r && r.movidas) || 0;
        toast('✓', 'Sprint cerrado' + (movidas ? ' · ' + movidas + ' tarea(s) movida(s)' : ''), 'success');
        await loadTareas();
        await _refreshSprints();
        openSprintsManager();
      } catch (e) {
        if (btn) btn.disabled = false;
        const err = document.getElementById('cs_err');
        if (err) { err.textContent = e.message; err.hidden = false; } else { toast('✕', e.message, 'error'); }
      }
    }

    /* ─── Boot ──────────────────────────────────────────────── */

    document.addEventListener('DOMContentLoaded', function () {
      initTheme(); initVersionBadge(); requireAuth(); renderSidebarUser(); initSidebarCollapse(); restrictWriteIfAgent(); init();
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
