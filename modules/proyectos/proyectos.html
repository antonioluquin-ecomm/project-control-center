<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyectos — Project Control Center</title>
  <script>(function(){var saved=localStorage.getItem('pcc_theme');var t=saved?saved:(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);if(localStorage.getItem('pcc_sidebar')==='collapsed')document.documentElement.setAttribute('data-sidebar','collapsed');})();</script>
  <link rel="icon" type="image/svg+xml" href="../../src/assets/brand-mark.svg">
  <link rel="stylesheet" href="../../src/css/main.css" />
  <style>
    .sort-th { cursor: pointer; user-select: none; white-space: nowrap; }
    .sort-th:hover { background: color-mix(in srgb, var(--text) 5%, var(--bg)); }
    .sort-th:focus-visible { outline: 2px solid var(--primary); outline-offset: -2px; }
    .sort-icon { display: inline-block; width: 10px; margin-left: 3px; font-size: 9px; color: var(--muted); }

    /* Labels de la barra de filtros: mismo patron que .field, en version
       compacta para no expandir el alto del toolbar. */
    .toolbar-proyectos { align-items: flex-end; }
    .toolbar-proyectos .field { margin-bottom: 0; gap: 3px; min-width: 0; }
    .toolbar-proyectos .field label { font-size: 11.5px; }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">
          <svg viewBox="0 0 44 44" width="60%" height="60%" aria-hidden="true">
            <rect x="7" y="21" width="7" height="16" rx="2.5" fill="#fff" opacity=".55"/>
            <rect x="18.5" y="13" width="7" height="24" rx="2.5" fill="#fff" opacity=".75"/>
            <rect x="30" y="7" width="7" height="30" rx="2.5" fill="#fff" opacity=".95"/>
          </svg>
        </span>
        <div>
          <div class="brand-name">Control Center</div>
          <div class="brand-meta" id="sidebarVersionBtn" title="Ver historial de cambios">
            <span id="sidebarVersion">v…</span>
            <span>· Proyectos</span>
          </div>
          <div class="sidebar-version-popover" id="versionPopover" style="display:none;"></div>
        </div>
      </div>
      <nav class="nav">
        <a class="nav-item" href="../../index.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Inicio</a>
        <a class="nav-item active" href="proyectos.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg> Proyectos</a>
        <a class="nav-item" href="../tareas/tareas.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Tareas</a>
        <a class="nav-item" href="../seguimiento/seguimiento.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> Seguimiento</a>
        <a class="nav-item" href="../actividad/actividad.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Actividad</a>
        <a class="nav-item" href="../reportes/reportes.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> Reportes</a>
        <a class="nav-item" href="../gantt/gantt.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="15" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg> Gantt</a>
      </nav>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-footer" id="sidebarFooter">
        <a class="nav-item admin-only" href="../admin/usuarios.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg> Configuración</a>
      </div>
    </aside>

    <div class="content-area">
      <div class="topbar">
        <button class="topbar-toggle" id="sidebarCollapseBtn" type="button" aria-pressed="false" title="Ocultar menú lateral" aria-label="Mostrar u ocultar menú lateral"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="1.5" y="2.5" width="13" height="11" rx="2"/><line x1="6" y1="2.5" x2="6" y2="13.5"/></svg></button>
        <span class="topbar-brand">Control Center</span>
        <span class="topbar-sep">›</span>
        <span class="topbar-crumb">Proyectos</span>
        <div class="topbar-actions"></div>
      </div>

      <main class="container">
        <div class="page-header">
          <h1>Proyectos</h1>
        </div>
        <section class="panel">
          <div class="toolbar toolbar-proyectos">
            <div class="field">
              <label for="q">Buscar</label>
              <input type="search" id="q" placeholder="Buscar proyecto…" style="max-width:260px" oninput="render()" />
            </div>
            <div class="field">
              <label for="fEstado">Estado</label>
              <select id="fEstado" onchange="render()" style="max-width:170px"><option value="">Todos los estados</option></select>
            </div>
            <div class="field">
              <label for="fResp">Responsable</label>
              <select id="fResp" onchange="render()" style="max-width:170px"><option value="">Todos los responsables</option></select>
            </div>
            <span class="spacer"></span>
            <button class="secondary sm" onclick="exportCSV()">Exportar CSV</button>
            <button class="sm admin-only" onclick="openModal()">+ Nuevo proyecto</button>
          </div>
          <div id="statusBar" class="status-bar">Cargando…</div>
          <div class="table-wrap" style="margin-top:12px">
            <table>
              <thead><tr>
                <th class="sort-th" tabindex="0" data-sort="nombre" onclick="sortBy('nombre')" onkeydown="sortKey(event,'nombre')">Proyecto <span class="sort-icon" aria-hidden="true"></span></th>
                <th class="sort-th" tabindex="0" data-sort="estado" onclick="sortBy('estado')" onkeydown="sortKey(event,'estado')">Estado <span class="sort-icon" aria-hidden="true"></span></th>
                <th class="sort-th" tabindex="0" data-sort="prioridad" onclick="sortBy('prioridad')" onkeydown="sortKey(event,'prioridad')">Prioridad <span class="sort-icon" aria-hidden="true"></span></th>
                <th class="sort-th" tabindex="0" data-sort="responsable" onclick="sortBy('responsable')" onkeydown="sortKey(event,'responsable')">Responsable <span class="sort-icon" aria-hidden="true"></span></th>
                <th class="sort-th" tabindex="0" data-sort="avance_pct" onclick="sortBy('avance_pct')" onkeydown="sortKey(event,'avance_pct')">Avance <span class="sort-icon" aria-hidden="true"></span></th>
                <th class="sort-th" tabindex="0" data-sort="fecha_fin_estimada" onclick="sortBy('fecha_fin_estimada')" onkeydown="sortKey(event,'fecha_fin_estimada')">Vence <span class="sort-icon" aria-hidden="true"></span></th>
                <th style="text-align:right">Acciones</th>
              </tr></thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div id="modals"></div>

  <script src="../../config.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../api.js"></script>
  <script src="../../actividad.js"></script>
  <script>
    let _editId = null;
    let _sortCol = null;
    let _sortDir = 1;

    async function load() {
      setStatus('statusBar', 'Cargando…', 'info');
      try {
        await loadCatalogos();
        await loadUsuariosBasico();
        STATE.proyectos = await apiGetProyectos({});
        const sel = document.getElementById('fEstado');
        sel.innerHTML = '<option value="">Todos los estados</option>' + cat('estados_proyecto', ESTADOS_PROYECTO).map(function (e) { return '<option>' + e + '</option>'; }).join('');
        const resps = [...new Set(STATE.proyectos.map(function (p) { return p.responsable || ''; }).filter(Boolean))].sort();
        const selR = document.getElementById('fResp');
        selR.innerHTML = '<option value="">Todos los responsables</option>' + resps.map(function (r) { return '<option>' + escapeHtml(r) + '</option>'; }).join('');
        render();
        setStatus('statusBar', STATE.proyectos.length + ' proyectos.', 'success');
        if (/[?&]new=1/.test(location.search) && isAdmin()) openModal();
        // Deep-link desde una notificación: ?actividad=<id> abre el panel de actividad.
        const mA = location.search.match(/[?&]actividad=(\d+)/);
        if (mA) actProyecto(Number(mA[1]));
      } catch (err) { setStatus('statusBar', 'Error: ' + err.message, 'error'); }
    }

    function filtered() {
      const q = normalizeText(document.getElementById('q').value);
      const est = document.getElementById('fEstado').value;
      const resp = document.getElementById('fResp').value;
      return STATE.proyectos.filter(function (p) {
        if (est && p.estado !== est) return false;
        if (resp && (p.responsable || '') !== resp) return false;
        if (q && normalizeText(p.nombre + ' ' + (p.responsable || '')).indexOf(q) === -1) return false;
        return true;
      });
    }

    function sortBy(col) {
      if (_sortCol === col) _sortDir *= -1;
      else { _sortCol = col; _sortDir = 1; }
      render();
    }

    function sortKey(event, col) {
      if (event.key !== 'Enter' && event.key !== ' ') return;
      event.preventDefault();
      sortBy(col);
    }

    function sorted(rows) {
      if (!_sortCol) return rows;
      const priorityOrder = cat('prioridades', PRIORIDADES);
      const statusOrder = cat('estados_proyecto', ESTADOS_PROYECTO);
      return rows.map(function (row, index) { return { row: row, index: index }; }).sort(function (a, b) {
        const va = a.row[_sortCol];
        const vb = b.row[_sortCol];
        const emptyA = va === '' || va == null;
        const emptyB = vb === '' || vb == null;
        if (emptyA !== emptyB) return emptyA ? 1 : -1;
        if (emptyA && emptyB) return a.index - b.index;
        let result;
        if (_sortCol === 'avance_pct') result = Number(va) - Number(vb);
        else if (_sortCol === 'fecha_fin_estimada') result = new Date(va) - new Date(vb);
        else if (_sortCol === 'prioridad') result = priorityOrder.indexOf(va) - priorityOrder.indexOf(vb);
        else if (_sortCol === 'estado') result = statusOrder.indexOf(va) - statusOrder.indexOf(vb);
        else result = String(va).localeCompare(String(vb), 'es', { sensitivity: 'base' });
        return result === 0 ? a.index - b.index : result * _sortDir;
      }).map(function (item) { return item.row; });
    }

    function updateSortHeaders() {
      document.querySelectorAll('th[data-sort]').forEach(function (th) {
        const active = th.dataset.sort === _sortCol;
        th.setAttribute('aria-sort', active ? (_sortDir === 1 ? 'ascending' : 'descending') : 'none');
        th.querySelector('.sort-icon').textContent = active ? (_sortDir === 1 ? '▲' : '▼') : '';
      });
    }
    function render() {
      const rows = sorted(filtered());
      updateSortHeaders();
      const tb = document.getElementById('tbody');
      if (!rows.length) { tb.innerHTML = '<tr><td colspan="7" class="empty-row">Sin resultados</td></tr>'; return; }
      tb.innerHTML = rows.map(function (p) {
        const cls = ESTADO_CLASS[p.estado] || 'st-todo';
        const venc = p.vencido ? ' <span class="badge vencida">Vencido</span>' : '';
        const prc = PRIORIDAD_CLASS[p.prioridad] || '';
        return '<tr>' +
          '<td><b>' + escapeHtml(p.nombre) + '</b><br /><span class="text-muted" style="font-size:11px">' + escapeHtml((p.descripcion || '').slice(0, 70)) + '</span></td>' +
          '<td><span class="badge ' + cls + '">' + escapeHtml(p.estado) + '</span>' + venc + '</td>' +
          '<td class="' + prc + '">' + escapeHtml(p.prioridad || '—') + '</td>' +
          '<td>' + escapeHtml(p.responsable || '—') + '</td>' +
          '<td class="mono">' + (p.avance_pct || 0) + '%</td>' +
          '<td class="mono">' + fmtDate(p.fecha_fin_estimada) + '</td>' +
          '<td><div class="row-actions compact-actions">' +
            '<a class="button sm action-primary" href="../tareas/tareas.html?proyecto=' + p.id + '">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Tareas</a>' +
            '<button class="action-icon" onclick="actProyecto(' + p.id + ')" title="Ver actividad" aria-label="Ver actividad de ' + escapeHtml(p.nombre) + '">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg></button>' +
            '<button class="action-icon admin-only" onclick="openModal(' + p.id + ')" title="Editar proyecto" aria-label="Editar ' + escapeHtml(p.nombre) + '">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/></svg></button>' +
            '<button class="action-icon danger admin-only" onclick="del(' + p.id + ')" title="Cancelar proyecto" aria-label="Cancelar ' + escapeHtml(p.nombre) + '">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></button>' +
          '</div></td></tr>';
      }).join('');
      restrictWriteIfAgent();
    }

    function exportCSV() {
      const rows = [['id', 'nombre', 'estado', 'prioridad', 'responsable', 'sitio', 'avance_pct', 'fecha_inicio', 'fecha_fin_estimada']];
      filtered().forEach(function (p) { rows.push([p.id, p.nombre, p.estado, p.prioridad, p.responsable, p.sitio, p.avance_pct, (p.fecha_inicio || '').slice(0, 10), (p.fecha_fin_estimada || '').slice(0, 10)]); });
      downloadCSV('proyectos.csv', rows);
    }

    function openModal(id) {
      _editId = id || null;
      const p = id ? STATE.proyectos.filter(function (x) { return Number(x.id) === Number(id); })[0] : {};
      const opt = function (arr, sel) { return arr.map(function (v) { return '<option' + (v === sel ? ' selected' : '') + '>' + v + '</option>'; }).join(''); };
      document.getElementById('modals').innerHTML =
        '<div class="modal-overlay"><div class="modal"><h3>' + (id ? 'Editar' : 'Nuevo') + ' proyecto</h3>' +
        '<div class="field"><label>Nombre *</label><input id="m_nombre" value="' + escapeHtml(p.nombre || '') + '"></div>' +
        '<div class="field"><label>Descripción</label><textarea id="m_desc" placeholder="# Título&#10;## Subtítulo&#10;- viñeta">' + escapeHtml(p.descripcion || '') + '</textarea></div>' +
        '<div class="field-row">' +
          '<div class="field"><label>Estado</label><select id="m_estado">' + opt(cat('estados_proyecto', ESTADOS_PROYECTO), p.estado || 'Por Hacer') + '</select></div>' +
          '<div class="field"><label>Prioridad</label><select id="m_prio">' + opt(cat('prioridades', PRIORIDADES), p.prioridad || 'Medium') + '</select></div>' +
        '</div>' +
        '<div class="field-row">' +
          '<div class="field"><label>Responsable</label><select id="m_resp">' + responsableOptions(p.responsable || '') + '</select></div>' +
          '<div class="field"><label>Sitio</label><select id="m_sitio"><option value="">—</option>' + opt(cat('sitios', SITIOS), p.sitio || '') + '</select></div>' +
        '</div>' +
        '<div class="field-row">' +
          '<div class="field"><label>Fecha inicio</label><input id="m_ini" type="date" value="' + (p.fecha_inicio || '').slice(0, 10) + '"></div>' +
          '<div class="field"><label>Fecha fin estimada</label><input id="m_fin" type="date" value="' + (p.fecha_fin_estimada || '').slice(0, 10) + '"></div>' +
        '</div>' +
        '<div class="field"><label>Observaciones</label><textarea id="m_obs">' + escapeHtml(p.observaciones || '') + '</textarea></div>' +
        '<div id="m_err" class="status-bar error" hidden></div>' +
        '<div class="modal-actions"><button class="secondary" onclick="closeModal()">Cancelar</button>' +
        '<button id="m_save" onclick="save()">Guardar</button></div></div></div>';
    }

    function closeModal() { document.getElementById('modals').innerHTML = ''; }

    async function save() {
      const nombre = document.getElementById('m_nombre').value.trim();
      const err = document.getElementById('m_err');
      if (!nombre) { err.textContent = 'El nombre es obligatorio.'; err.hidden = false; return; }
      const data = {
        nombre: nombre,
        descripcion: document.getElementById('m_desc').value.trim(),
        estado: document.getElementById('m_estado').value,
        prioridad: document.getElementById('m_prio').value,
        responsable: document.getElementById('m_resp').value.trim(),
        sitio: document.getElementById('m_sitio').value,
        fecha_inicio: document.getElementById('m_ini').value,
        fecha_fin_estimada: document.getElementById('m_fin').value,
        observaciones: document.getElementById('m_obs').value.trim(),
      };
      const btn = document.getElementById('m_save'); btn.disabled = true;
      try {
        if (_editId) { data.id = _editId; await apiUpdateProyecto(data); } else { await apiCreateProyecto(data); }
        closeModal(); toast('✓', 'Proyecto guardado', 'success'); load();
      } catch (e) { btn.disabled = false; err.textContent = e.message; err.hidden = false; }
    }

    function actProyecto(id) {
      const p = STATE.proyectos.filter(function (x) { return Number(x.id) === Number(id); })[0];
      openActividad('PROYECTO', id, p ? p.nombre : ('Proyecto #' + id));
    }

    async function del(id) {
      const p = STATE.proyectos.filter(function (x) { return Number(x.id) === Number(id); })[0];
      if (!confirm('¿Cancelar el proyecto "' + (p ? p.nombre : id) + '"? (soft delete)')) return;
      try { await apiDeleteProyecto(id); toast('✓', 'Proyecto cancelado', 'success'); load(); }
      catch (e) { toast('✕', e.message, 'error'); }
    }

    document.addEventListener('DOMContentLoaded', function () {
      initTheme(); initVersionBadge(); requireAuth(); renderSidebarUser(); initSidebarCollapse(); restrictWriteIfAgent(); load();
    });
  </script>
</body>
</html>
