<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyectos — Project Control Center</title>
  <script>(function(){var t=localStorage.getItem('pcc_theme')==='dark'?'dark':'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="../../src/css/main.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">PCC</span>
        <span><span class="brand-name">Control Center</span><br /><span class="brand-sub">Proyectos</span></span>
      </div>
      <nav class="nav">
        <a class="nav-item" href="../../index.html"><span class="nav-icon">▦</span> Inicio</a>
        <a class="nav-item active" href="proyectos.html"><span class="nav-icon">▣</span> Proyectos</a>
        <a class="nav-item" href="../tareas/tareas.html"><span class="nav-icon">☑</span> Tareas</a>
        <a class="nav-item" href="../seguimiento/seguimiento.html"><span class="nav-icon">◎</span> Seguimiento</a>
        <a class="nav-item" href="../reportes/reportes.html"><span class="nav-icon">▤</span> Reportes</a>
        <a class="nav-item" href="../gantt/gantt.html"><span class="nav-icon">▦</span> Gantt</a>
        <a class="nav-item admin-only" href="../admin/usuarios.html"><span class="nav-icon">⚇</span> Usuarios</a>
      </nav>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-footer">
        <a class="nav-item" onclick="toggleTheme()"><span class="nav-icon" id="theme-toggle-icon">☀️</span> Tema</a>
      </div>
    </aside>

    <div class="content-area">
      <header class="topbar">
        <div class="topbar-copy"><p class="eyebrow">Gestión</p><h1>Proyectos</h1></div>
        <div id="userChip" style="display:flex;gap:8px;align-items:center"></div>
      </header>

      <main class="container">
        <section class="panel">
          <div class="toolbar">
            <input type="search" id="q" placeholder="Buscar proyecto…" style="max-width:260px" oninput="render()" />
            <select id="fEstado" onchange="render()" style="max-width:170px"><option value="">Todos los estados</option></select>
            <span class="spacer"></span>
            <button class="secondary sm" onclick="exportCSV()">Exportar CSV</button>
            <button class="sm admin-only" onclick="openModal()">+ Nuevo proyecto</button>
          </div>
          <div id="statusBar" class="status-bar">Cargando…</div>
          <div class="table-wrap" style="margin-top:12px">
            <table>
              <thead><tr>
                <th>Proyecto</th><th>Estado</th><th>Prioridad</th><th>Responsable</th>
                <th>Avance</th><th>Vence</th><th style="text-align:right">Acciones</th>
              </tr></thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div id="modals"></div>

  <script src="../../config.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../api.js"></script>
  <script src="../../actividad.js"></script>
  <script>
    let _editId = null;

    async function load() {
      setStatus('statusBar', 'Cargando…', 'info');
      try {
        await loadUsuariosBasico();
        STATE.proyectos = await apiGetProyectos({});
        const sel = document.getElementById('fEstado');
        sel.innerHTML = '<option value="">Todos los estados</option>' + ESTADOS_PROYECTO.map(function (e) { return '<option>' + e + '</option>'; }).join('');
        render();
        setStatus('statusBar', STATE.proyectos.length + ' proyectos.', 'success');
        if (/[?&]new=1/.test(location.search) && isAdmin()) openModal();
      } catch (err) { setStatus('statusBar', 'Error: ' + err.message, 'error'); }
    }

    function filtered() {
      const q = normalizeText(document.getElementById('q').value);
      const est = document.getElementById('fEstado').value;
      return STATE.proyectos.filter(function (p) {
        if (est && p.estado !== est) return false;
        if (q && normalizeText(p.nombre + ' ' + (p.responsable || '')).indexOf(q) === -1) return false;
        return true;
      });
    }

    function render() {
      const rows = filtered();
      const tb = document.getElementById('tbody');
      if (!rows.length) { tb.innerHTML = '<tr><td colspan="7" class="empty-row">Sin resultados</td></tr>'; return; }
      tb.innerHTML = rows.map(function (p) {
        const cls = ESTADO_CLASS[p.estado] || 'st-todo';
        const venc = p.vencido ? ' <span class="badge vencida">Vencido</span>' : '';
        const prc = PRIORIDAD_CLASS[p.prioridad] || '';
        return '<tr>' +
          '<td><b>' + escapeHtml(p.nombre) + '</b><br /><span class="text-muted" style="font-size:11px">' + escapeHtml((p.descripcion || '').slice(0, 70)) + '</span></td>' +
          '<td><span class="badge ' + cls + '">' + escapeHtml(p.estado) + '</span>' + venc + '</td>' +
          '<td class="' + prc + '">' + escapeHtml(p.prioridad || '—') + '</td>' +
          '<td>' + escapeHtml(p.responsable || '—') + '</td>' +
          '<td class="mono">' + (p.avance_pct || 0) + '%</td>' +
          '<td class="mono">' + fmtDate(p.fecha_fin_estimada) + '</td>' +
          '<td class="row-actions">' +
            '<a class="button secondary sm" href="../tareas/tareas.html?proyecto=' + p.id + '">Tareas</a>' +
            '<button class="secondary sm" onclick="actProyecto(' + p.id + ')">Actividad</button>' +
            '<button class="secondary sm admin-only" onclick="openModal(' + p.id + ')">Editar</button>' +
            '<button class="danger sm admin-only" onclick="del(' + p.id + ')">Eliminar</button>' +
          '</td></tr>';
      }).join('');
      restrictWriteIfAgent();
    }

    function exportCSV() {
      const rows = [['id', 'nombre', 'estado', 'prioridad', 'responsable', 'sitio', 'avance_pct', 'fecha_inicio', 'fecha_fin_estimada']];
      filtered().forEach(function (p) { rows.push([p.id, p.nombre, p.estado, p.prioridad, p.responsable, p.sitio, p.avance_pct, (p.fecha_inicio || '').slice(0, 10), (p.fecha_fin_estimada || '').slice(0, 10)]); });
      downloadCSV('proyectos.csv', rows);
    }

    function openModal(id) {
      _editId = id || null;
      const p = id ? STATE.proyectos.filter(function (x) { return Number(x.id) === Number(id); })[0] : {};
      const opt = function (arr, sel) { return arr.map(function (v) { return '<option' + (v === sel ? ' selected' : '') + '>' + v + '</option>'; }).join(''); };
      document.getElementById('modals').innerHTML =
        '<div class="modal-overlay"><div class="modal"><h3>' + (id ? 'Editar' : 'Nuevo') + ' proyecto</h3>' +
        '<div class="field"><label>Nombre *</label><input id="m_nombre" value="' + escapeHtml(p.nombre || '') + '"></div>' +
        '<div class="field"><label>Descripción</label><textarea id="m_desc">' + escapeHtml(p.descripcion || '') + '</textarea></div>' +
        '<div class="field-row">' +
          '<div class="field"><label>Estado</label><select id="m_estado">' + opt(ESTADOS_PROYECTO, p.estado || 'Por Hacer') + '</select></div>' +
          '<div class="field"><label>Prioridad</label><select id="m_prio">' + opt(PRIORIDADES, p.prioridad || 'Medium') + '</select></div>' +
        '</div>' +
        '<div class="field-row">' +
          '<div class="field"><label>Responsable</label><select id="m_resp">' + responsableOptions(p.responsable || '') + '</select></div>' +
          '<div class="field"><label>Sitio</label><select id="m_sitio"><option value="">—</option>' + opt(SITIOS, p.sitio || '') + '</select></div>' +
        '</div>' +
        '<div class="field-row">' +
          '<div class="field"><label>Fecha inicio</label><input id="m_ini" type="date" value="' + (p.fecha_inicio || '').slice(0, 10) + '"></div>' +
          '<div class="field"><label>Fecha fin estimada</label><input id="m_fin" type="date" value="' + (p.fecha_fin_estimada || '').slice(0, 10) + '"></div>' +
        '</div>' +
        '<div class="field"><label>Observaciones</label><textarea id="m_obs">' + escapeHtml(p.observaciones || '') + '</textarea></div>' +
        '<div id="m_err" class="status-bar error" hidden></div>' +
        '<div class="modal-actions"><button class="secondary" onclick="closeModal()">Cancelar</button>' +
        '<button id="m_save" onclick="save()">Guardar</button></div></div></div>';
    }

    function closeModal() { document.getElementById('modals').innerHTML = ''; }

    async function save() {
      const nombre = document.getElementById('m_nombre').value.trim();
      const err = document.getElementById('m_err');
      if (!nombre) { err.textContent = 'El nombre es obligatorio.'; err.hidden = false; return; }
      const data = {
        nombre: nombre,
        descripcion: document.getElementById('m_desc').value.trim(),
        estado: document.getElementById('m_estado').value,
        prioridad: document.getElementById('m_prio').value,
        responsable: document.getElementById('m_resp').value.trim(),
        sitio: document.getElementById('m_sitio').value,
        fecha_inicio: document.getElementById('m_ini').value,
        fecha_fin_estimada: document.getElementById('m_fin').value,
        observaciones: document.getElementById('m_obs').value.trim(),
      };
      const btn = document.getElementById('m_save'); btn.disabled = true;
      try {
        if (_editId) { data.id = _editId; await apiUpdateProyecto(data); } else { await apiCreateProyecto(data); }
        closeModal(); toast('✓', 'Proyecto guardado', 'success'); load();
      } catch (e) { btn.disabled = false; err.textContent = e.message; err.hidden = false; }
    }

    function actProyecto(id) {
      const p = STATE.proyectos.filter(function (x) { return Number(x.id) === Number(id); })[0];
      openActividad('PROYECTO', id, p ? p.nombre : ('Proyecto #' + id));
    }

    async function del(id) {
      const p = STATE.proyectos.filter(function (x) { return Number(x.id) === Number(id); })[0];
      if (!confirm('¿Cancelar el proyecto "' + (p ? p.nombre : id) + '"? (soft delete)')) return;
      try { await apiDeleteProyecto(id); toast('✓', 'Proyecto cancelado', 'success'); load(); }
      catch (e) { toast('✕', e.message, 'error'); }
    }

    document.addEventListener('DOMContentLoaded', function () {
      initTheme(); requireAuth(); renderUserChip(); restrictWriteIfAgent(); load();
    });
  </script>
</body>
</html>
