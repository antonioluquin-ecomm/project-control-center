<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Actividad - Project Control Center</title>
  <script>(function(){var saved=localStorage.getItem('pcc_theme');var t=saved?saved:(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);if(localStorage.getItem('pcc_sidebar')==='collapsed')document.documentElement.setAttribute('data-sidebar','collapsed');})();</script>
  <link rel="icon" type="image/svg+xml" href="../../src/assets/brand-mark.svg">
  <link rel="stylesheet" href="../../src/css/main.css" />
  <style>
    #tipoTabs { max-width: 100%; overflow-x: auto; flex-wrap: nowrap; }
    #tipoTabs .tab-btn { white-space: nowrap; }
    .activity-layout { display: grid; grid-template-columns: minmax(0, 1fr) 280px; gap: 16px; align-items: start; }
    .activity-group { margin-bottom: 18px; }
    .activity-group:last-child { margin-bottom: 0; }
    .activity-group-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .activity-group-title { font-weight: 700; font-size: 13px; color: var(--text); text-decoration: none; }
    .activity-group-title:hover { color: var(--primary); }
    .activity-group-count { color: var(--muted); font-size: 12px; }
    .activity-feed { display: grid; gap: 10px; }
    .activity-item { display: grid; grid-template-columns: 74px minmax(0, 1fr); gap: 12px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--card); padding: 12px 14px; }
    #activityFeed.has-dates .activity-item { grid-template-columns: 118px minmax(0, 1fr); }
    .activity-time { font-family: var(--mono); color: var(--muted); font-size: 12px; padding-top: 2px; white-space: nowrap; }
    .activity-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 5px; }
    .activity-title { font-weight: 700; font-size: 13.5px; color: var(--text); }
    .activity-meta { color: var(--muted); font-size: 12px; }
    .activity-text { font-size: 13px; line-height: 1.5; color: var(--text); white-space: pre-wrap; }
    .activity-change { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .activity-old { color: var(--muted); text-decoration: line-through; }
    .activity-new { color: var(--success); font-weight: 700; }
    .activity-side { position: sticky; top: 66px; display: grid; gap: 12px; }
    .activity-user-list { display: grid; gap: 8px; }
    .activity-user-row { display: flex; justify-content: space-between; gap: 8px; font-size: 12.5px; border-bottom: 1px solid var(--line); padding-bottom: 7px; }
    .activity-user-row:last-child { border-bottom: 0; padding-bottom: 0; }
    .activity-user-row b { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .activity-filter-toolbar { display: grid; grid-template-columns: minmax(180px, 280px) minmax(180px, 240px); gap: 10px; align-items: end; margin-top: 12px; }
    .activity-filter-toolbar .field { margin: 0; }
    @media (max-width: 980px) { .activity-layout { grid-template-columns: 1fr; } .activity-side { position: static; } }
    @media (max-width: 620px) { .activity-filter-toolbar { grid-template-columns: 1fr; } .activity-item, #activityFeed.has-dates .activity-item { grid-template-columns: 1fr; } .activity-time { padding-top: 0; } }
  </style>
</head>

  <script>
    let _actividad = { fecha: '', fecha_hasta: '', items: [] };

    function localDateValue(d) {
      const date = d || new Date();
      const offset = date.getTimezoneOffset() * 60000;
      return new Date(date.getTime() - offset).toISOString().slice(0, 10);
    }

    function addDays(dateStr, delta) {
      const d = new Date(dateStr + 'T00:00:00');
      d.setDate(d.getDate() + delta);
      return localDateValue(d);
    }

    // "Hoy" lo define el servidor (su zona horaria es la que agrupa la minuta),
    // no el navegador: evita pedir un dia que el backend agrupa distinto.
    function setToday() {
      loadActividad('', '');
    }

    // Mueve todo el rango (Desde/Hasta) manteniendo su duracion, para navegar
    // dia a dia o semana a semana segun el rango que haya elegido el usuario.
    function shiftRange(deltaDays) {
      const desde = document.getElementById('fechaActividad').value || _actividad.fecha;
      const hasta = document.getElementById('fechaHasta').value || desde;
      loadActividad(addDays(desde, deltaDays), addDays(hasta, deltaDays));
    }

    async function loadActividad(fechaParam, fechaHastaParam) {
      const fecha = fechaParam !== undefined ? fechaParam : (document.getElementById('fechaActividad').value || '');
      const fechaHasta = fechaHastaParam !== undefined ? fechaHastaParam : (document.getElementById('fechaHasta').value || '');
      setStatus('statusBar', 'Cargando actividad...', 'info');
      try {
        _actividad = await apiGetActividadDiaria({ fecha: fecha, fecha_hasta: fechaHasta });
        document.getElementById('fechaActividad').value = _actividad.fecha;
        document.getElementById('fechaHasta').value = _actividad.fecha_hasta;
        updateActivityFilters_();
        renderActividad();
        setStatus('statusBar', 'Actividad cargada para ' + rangoLabel_() + '.', 'success');
      } catch (err) {
        setStatus('statusBar', 'Error: ' + err.message, 'error');
      }
    }

    function esRangoUnico_() {
      return !_actividad.fecha_hasta || _actividad.fecha_hasta === _actividad.fecha;
    }

    function rangoLabel_() {
      return esRangoUnico_() ? fmtInputDate(_actividad.fecha) : (fmtInputDate(_actividad.fecha) + ' a ' + fmtInputDate(_actividad.fecha_hasta));
    }

    let _tab = '';

    function _setTab(tipo) {
      _tab = tipo;
      document.querySelectorAll('#tipoTabs .tab-btn').forEach(function (btn) {
        btn.classList.toggle('active', btn.dataset.tipo === tipo);
      });
      renderActividad();
    }

    // Tareas que pasaron a Finalizada dentro del rango, una fila por tarea
    // (no por evento): si se finalizo mas de una vez en el rango, se queda
    // con la mas reciente. Los items ya vienen ordenados por fecha desc,
    // asi que la primera aparicion de cada id_entidad es la mas reciente.
    function finalizadasList() {
      const vistas = {};
      const out = [];
      (_actividad.items || []).forEach(function (item) {
        if (item.tipo !== 'estado' || item.entidad !== 'TAREA' || item.valor_nuevo !== 'Finalizada') return;
        if (vistas[item.id_entidad]) return;
        vistas[item.id_entidad] = true;
        out.push(Object.assign({}, item, { tipo: 'finalizada' }));
      });
      return out;
    }

    function filteredItems() {
      const q = normalizeText(document.getElementById('q').value || '');
      const proyecto = document.getElementById('fProyectoActividad').value;
      const usuario = document.getElementById('fUsuarioActividad').value;
      const base = _tab === 'finalizada'
        ? finalizadasList()
        : (_actividad.items || []).filter(function (item) { return !_tab || item.tipo === _tab; });
      return base.filter(function (item) {
        if (proyecto && item.proyecto !== proyecto) return false;
        if (usuario && item.usuario !== usuario) return false;
        if (!q) return true;
        return normalizeText([item.titulo, item.proyecto, item.usuario, item.area, item.texto, item.campo, item.valor_anterior, item.valor_nuevo].join(' ')).indexOf(q) !== -1;
      });
    }

    function updateActivityFilters_() {
      const projectSelect = document.getElementById('fProyectoActividad');
      const userSelect = document.getElementById('fUsuarioActividad');
      const selectedProject = projectSelect.value;
      const selectedUser = userSelect.value;
      const items = _actividad.items || [];
      const projects = unique(items.map(function (item) { return item.proyecto; }).filter(Boolean)).sort(function (a, b) { return a.localeCompare(b, 'es'); });
      const users = unique(items.map(function (item) { return item.usuario; }).filter(Boolean)).sort(function (a, b) { return a.localeCompare(b, 'es'); });

      projectSelect.innerHTML = '<option value="">Todos los proyectos</option>' + projects.map(function (project) {
        return '<option value="' + escapeHtml(project) + '">' + escapeHtml(project) + '</option>';
      }).join('');
      userSelect.innerHTML = '<option value="">Todos los usuarios</option>' + users.map(function (user) {
        return '<option value="' + escapeHtml(user) + '">' + escapeHtml(user) + '</option>';
      }).join('');

      projectSelect.value = projects.indexOf(selectedProject) !== -1 ? selectedProject : '';
      userSelect.value = users.indexOf(selectedUser) !== -1 ? selectedUser : '';
    }

    const TAB_TITLE = { '': 'Todo', alta: 'Altas', estado: 'Estados', cambio: 'Otros cambios', comentario: 'Comentarios', finalizada: 'Finalizadas' };
    const TIPO_LABEL = { alta: 'Alta', estado: 'Estado', cambio: 'Cambio', comentario: 'Comentario', finalizada: 'Finalizada' };
    const TIPO_BADGE_CLASS = { alta: 'st-done', estado: 'st-progress', cambio: 'st-revision', comentario: 'st-analysis', finalizada: 'st-done' };

    function renderActividad() {
      const items = filteredItems();
      renderKpis(items);
      renderFeed(items);
      renderUsers(items);
      renderSummary(items);
      document.getElementById('activityCount').textContent = rangoLabel_() + ' · ' + items.length + ' movimientos';
    }

    function renderKpis(items) {
      const altas = items.filter(function (i) { return i.tipo === 'alta'; }).length;
      const estados = items.filter(function (i) { return i.tipo === 'estado'; }).length;
      const comentarios = items.filter(function (i) { return i.tipo === 'comentario'; }).length;
      const usuarios = unique(items.map(function (i) { return i.usuario; })).length;
      // Finalizadas se calcula siempre sobre el rango completo (no sobre el
      // tab activo), asi queda visible aunque estes mirando otro filtro.
      const finalizadas = finalizadasList().length;
      document.getElementById('kpiGrid').innerHTML =
        kpi('Movimientos', items.length) +
        kpi('Altas', altas) +
        kpi('Cambios de estado', estados) +
        kpi('Comentarios', comentarios) +
        kpi('Finalizadas', finalizadas, 'success') +
        kpi('Usuarios', usuarios);
    }

    function renderFeed(items) {
      const feed = document.getElementById('activityFeed');
      feed.classList.toggle('has-dates', !esRangoUnico_());
      if (!items.length) {
        feed.innerHTML = '<div class="empty-row">Sin actividad para los filtros seleccionados.</div>';
        return;
      }
      feed.innerHTML = groupByProyecto(items).map(renderGroup).join('');
    }

    // Agrupa preservando el orden de aparicion (los items ya vienen ordenados
    // por fecha desc), asi el proyecto con actividad mas reciente queda arriba.
    function groupByProyecto(items) {
      const order = [];
      const byKey = {};
      items.forEach(function (item) {
        const key = item.proyecto || '';
        if (!byKey[key]) { byKey[key] = { proyecto: item.proyecto, id_proyecto: item.id_proyecto, items: [] }; order.push(key); }
        byKey[key].items.push(item);
      });
      return order.map(function (k) { return byKey[k]; });
    }

    function renderGroup(group) {
      const nombre = group.proyecto || 'Sin proyecto';
      const titulo = group.id_proyecto
        ? '<a class="activity-group-title" href="' + proyectoLink_(group.id_proyecto) + '">' + escapeHtml(nombre) + '</a>'
        : '<span class="activity-group-title">' + escapeHtml(nombre) + '</span>';
      return '<div class="activity-group">' +
        '<div class="activity-group-head">' + titulo + '<span class="activity-group-count">' + group.items.length + '</span></div>' +
        '<div class="activity-feed">' + group.items.map(renderItem).join('') + '</div>' +
      '</div>';
    }

    function proyectoLink_(idProyecto) {
      return '../tareas/tareas.html?proyecto=' + encodeURIComponent(idProyecto);
    }

    function renderItem(item) {
      const badge = '<span class="badge ' + (TIPO_BADGE_CLASS[item.tipo] || 'st-todo') + '">' + escapeHtml(TIPO_LABEL[item.tipo] || item.tipo) + '</span>';
      const body = item.tipo === 'comentario'
        ? '<div class="activity-text">' + escapeHtml(item.texto || '') + '</div>'
        : (item.tipo === 'finalizada'
          ? (item.url_informe ? '<a class="link-chip" href="' + escapeHtml(item.url_informe) + '" target="_blank" rel="noopener">↗ Informe de gestión</a>' : '')
          : (item.tipo === 'alta'
            ? ''
            : '<div class="activity-change"><b>' + escapeHtml(item.campo || '') + '</b><span class="activity-old">' + escapeHtml(item.valor_anterior || 'vacio') + '</span><span class="text-muted">a</span><span class="activity-new">' + escapeHtml(item.valor_nuevo || 'vacio') + '</span></div>'));
      const meta = item.tipo === 'finalizada'
        ? (item.area ? 'Área responsable: ' + escapeHtml(item.area) : 'Sin área asignada')
        : escapeHtml(item.usuario || 'Sin usuario') + ' - ' + escapeHtml(item.entidad || '') + ' #' + escapeHtml(item.id_entidad || '');
      return '<article class="activity-item">' +
        '<div class="activity-time">' + escapeHtml(itemTimeLabel_(item)) + '</div>' +
        '<div>' +
          '<div class="activity-head">' + badge + '<span class="activity-title">' + escapeHtml(item.titulo || '') + '</span></div>' +
          '<div class="activity-meta">' + meta + '</div>' +
          body +
        '</div>' +
      '</article>';
    }

    // En un rango de varios dias la hora sola es ambigua: se antepone la fecha
    // (item.dia ya viene normalizado por el servidor, no se recalcula en el navegador).
    function itemTimeLabel_(item) {
      if (esRangoUnico_()) return item.hora || '--:--';
      return fmtInputDate(item.dia) + ' ' + (item.hora || '--:--');
    }

    function renderUsers(items) {
      const counts = {};
      items.forEach(function (item) { const u = item.usuario || 'Sin usuario'; counts[u] = (counts[u] || 0) + 1; });
      const rows = Object.keys(counts).sort(function (a, b) { return counts[b] - counts[a]; });
      document.getElementById('userList').innerHTML = rows.length ? rows.map(function (u) {
        return '<div class="activity-user-row"><b title="' + escapeHtml(u) + '">' + escapeHtml(u) + '</b><span class="mono">' + counts[u] + '</span></div>';
      }).join('') : '<div class="text-muted" style="font-size:13px">Sin participantes.</div>';
    }

    function renderSummary(items) {
      const proyectos = unique(items.map(function (i) { return i.proyecto; }).filter(Boolean));
      if (_tab === 'finalizada') {
        document.getElementById('quickSummary').textContent = items.length
          ? 'Se finalizaron ' + items.length + ' ' + plural(items.length, 'tarea', 'tareas') + ' en ' + proyectos.length + ' proyecto(s). Usa "Copiar resumen" para armar el detalle a enviar.'
          : 'No se finalizo ninguna tarea en ' + (esRangoUnico_() ? 'este dia' : 'este periodo') + '.';
        return;
      }
      const altas = items.filter(function (i) { return i.tipo === 'alta'; }).length;
      const estados = items.filter(function (i) { return i.tipo === 'estado'; }).length;
      const cambios = items.filter(function (i) { return i.tipo === 'cambio'; }).length;
      const comentarios = items.filter(function (i) { return i.tipo === 'comentario'; }).length;
      const usuarios = unique(items.map(function (i) { return i.usuario; }).filter(Boolean));
      document.getElementById('quickSummary').textContent = items.length
        ? 'Se registraron ' + items.length + ' movimientos: ' + altas + ' ' + plural(altas, 'alta', 'altas') + ', ' + estados + ' ' + plural(estados, 'cambio de estado', 'cambios de estado') + ', ' + cambios + ' ' + plural(cambios, 'otro cambio', 'otros cambios') + ' y ' + comentarios + ' ' + plural(comentarios, 'comentario', 'comentarios') + '. Participaron ' + usuarios.length + ' usuario(s) en ' + proyectos.length + ' proyecto(s).'
        : 'No hay actividad registrada para ' + (esRangoUnico_() ? 'este dia' : 'este periodo') + '.';
    }

    function kpi(label, value, cls) {
      return '<div class="kpi-card ' + (cls || '') + '"><div class="kpi-label">' + escapeHtml(label) + '</div><div class="kpi-value">' + value + '</div></div>';
    }

    function unique(arr) {
      const seen = {};
      arr.forEach(function (v) { if (v !== undefined && v !== null && v !== '') seen[v] = true; });
      return Object.keys(seen);
    }

    function plural(n, one, many) {
      return Number(n) === 1 ? one : many;
    }

    function fmtInputDate(v) {
      const m = String(v || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
      return m ? (m[3] + '/' + m[2] + '/' + m[1]) : fmtDate(v);
    }

    function exportCSV() {
      const rows = [['fecha', 'hora', 'tipo', 'entidad', 'id_entidad', 'titulo', 'proyecto', 'usuario', 'detalle']];
      filteredItems().forEach(function (item) {
        const detalle = item.tipo === 'comentario'
          ? item.texto
          : (item.tipo === 'alta' ? 'Alta de ' + item.entidad.toLowerCase() : item.campo + ': ' + (item.valor_anterior || '') + ' -> ' + (item.valor_nuevo || ''));
        rows.push([item.dia, item.hora, item.tipo, item.entidad, item.id_entidad, item.titulo, item.proyecto, item.usuario, detalle]);
      });
      const nombreRango = esRangoUnico_() ? _actividad.fecha : (_actividad.fecha + '_a_' + _actividad.fecha_hasta);
      downloadCSV('actividad-' + (nombreRango || localDateValue()) + '.csv', rows);
    }

    // Texto plano listo para pegar en un mail/chat (ej. el resumen semanal
    // de tareas finalizadas), respetando el tab y los filtros activos.
    function copyResumen() {
      const items = filteredItems();
      const lineas = [rangoLabel_() + ' — ' + (TAB_TITLE[_tab] || 'Actividad') + ' (' + items.length + ')', ''];
      items.forEach(function (item) {
        if (item.tipo === 'finalizada') {
          lineas.push('- ' + item.titulo + (item.proyecto ? ' (' + item.proyecto + ')' : '') + (item.area ? ' — ' + item.area : '') + ' — ' + fmtInputDate(item.dia) + (item.url_informe ? ' — ' + item.url_informe : ''));
        } else if (item.tipo === 'comentario') {
          lineas.push('- [' + (item.hora || '') + '] ' + item.titulo + ': ' + item.texto);
        } else if (item.tipo === 'alta') {
          lineas.push('- [' + (item.hora || '') + '] Alta: ' + item.titulo);
        } else {
          lineas.push('- [' + (item.hora || '') + '] ' + item.titulo + ' — ' + item.campo + ': ' + (item.valor_anterior || 'vacio') + ' a ' + (item.valor_nuevo || 'vacio'));
        }
      });
      if (items.length === 0) lineas.push('Sin movimientos para este filtro.');
      const texto = lineas.join('\n');
      navigator.clipboard.writeText(texto).then(function () {
        toast('\u{1F4CB}', 'Resumen copiado al portapapeles.', 'success');
      }).catch(function () {
        setStatus('statusBar', 'No se pudo copiar al portapapeles.', 'error');
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      initTheme(); initVersionBadge(); requireAuth(); renderSidebarUser(); initSidebarCollapse(); restrictWriteIfAgent();
      loadActividad('', '');
    });
  </script>
</body>
</html>
