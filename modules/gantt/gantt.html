<body>

      <nav class="nav">
        <a class="nav-item" href="../../index.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Inicio</a>
        <a class="nav-item" href="../proyectos/proyectos.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg> Proyectos</a>

        <a class="nav-item active" href="gantt.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="15" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg> Gantt</a>
      </nav>

      <div class="sidebar-footer" id="sidebarFooter">
        <a class="nav-item admin-only" href="../admin/usuarios.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg> Configuración</a>
      </div>
    </aside>

    <div class="content-area">
      <div class="topbar">
        <button class="topbar-toggle" id="sidebarCollapseBtn" type="button" aria-pressed="false" title="Ocultar menú lateral" aria-label="Mostrar u ocultar menú lateral"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="1.5" y="2.5" width="13" height="11" rx="2"/><line x1="6" y1="2.5" x2="6" y2="13.5"/></svg></button>
        <span class="topbar-brand">Control Center</span>
        <span class="topbar-sep">›</span>
        <span class="topbar-crumb">Gantt</span>
      </div>

      <main class="container">
        <div class="page-header">
          <h1>Gantt</h1>
        </div>
        <section class="panel">
          <div class="toolbar">
            <select id="selProyecto" onchange="loadTareas()" style="max-width:300px"></select>
            <select id="fArea" onchange="render()" style="max-width:150px"><option value="">Todas las áreas</option></select>
            <select id="fTienda" onchange="render()" style="max-width:150px"><option value="">Todas las tiendas</option></select>
            <select id="fSprint" onchange="render()" style="max-width:170px"><option value="">Todos los sprints</option></select>
            <span class="spacer"></span>
            <div class="seg-toggle">
              <button class="seg-tab active" id="zoomMes" onclick="setZoom('mes')">Mes</button>
              <button class="seg-tab" id="zoomSemana" onclick="setZoom('semana')">Semana</button>
            </div>
          </div>
          <div id="statusBar" class="status-bar">Cargando…</div>
          <div id="ganttHost" style="margin-top:12px"></div>
        </section>
      </main>
    </div>
  </div>

  <div id="modals"></div>

  <script src="../../config.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../api.js"></script>
  <script src="../../actividad.js"></script>
  <script>
    const PX = { mes: 5, semana: 22 };   // px por día según zoom
    const ROW_H = 34;                      // alto de fila (px)
    let _zoom = 'mes';

    function qsProyecto() { const m = location.search.match(/[?&]proyecto=(\d+)/); return m ? Number(m[1]) : null; }
    function currentProyectoId() { const v = document.getElementById('selProyecto').value; return v === '' ? null : Number(v); }

    async function init() {
      setStatus('statusBar', 'Cargando…', 'info');
      try {
        STATE.proyectos = await apiGetProyectos({});
        const sel = document.getElementById('selProyecto');
        sel.innerHTML = '<option value="">Todos los proyectos</option>' +
          STATE.proyectos.map(function (p) { return '<option value="' + p.id + '">' + escapeHtml(p.nombre) + '</option>'; }).join('');
        const pre = qsProyecto();
        if (pre && STATE.proyectos.some(function (p) { return Number(p.id) === pre; })) sel.value = pre;

        document.getElementById('fArea').innerHTML = '<option value="">Todas las áreas</option>' + AREAS.map(function (a) { return '<option>' + a + '</option>'; }).join('');
        document.getElementById('fTienda').innerHTML = '<option value="">Todas las tiendas</option>' + TIENDAS.map(function (t) { return '<option>' + t + '</option>'; }).join('');

        STATE.sprints = await apiGetSprints({});
        document.getElementById('fSprint').innerHTML = '<option value="">Todos los sprints</option>' +
          STATE.sprints.map(function (s) { return '<option value="' + s.id + '">' + escapeHtml(s.nombre) + '</option>'; }).join('');

        await loadTareas();
      } catch (err) { setStatus('statusBar', 'Error: ' + err.message, 'error'); }
    }

    function _sprintById(id) {
      if (!id) return null;
      return (STATE.sprints || []).filter(function (s) { return Number(s.id) === Number(id); })[0] || null;
    }

    function _sprintChip(id, fontSize) {
      const s = _sprintById(id);
      if (!s) return '';
      const cls = ESTADO_CLASS_SPRINT[s.estado] || 'st-todo';
      return '<span class="badge ' + cls + '" style="font-size:' + (fontSize || '11px') + '">' + escapeHtml(s.nombre) + '</span>';
    }

    async function loadTareas() {
      setStatus('statusBar', 'Cargando…', 'info');
      try {
        const pid = currentProyectoId();
        STATE.tareas = await apiGetTareas(pid ? { id_proyecto: pid } : {});
        render();
      } catch (err) { setStatus('statusBar', 'Error: ' + err.message, 'error'); }
    }

    function setZoom(z) {
      _zoom = z;
      document.getElementById('zoomMes').classList.toggle('active', z === 'mes');
      document.getElementById('zoomSemana').classList.toggle('active', z === 'semana');
      render();
    }

    function proyNombre(id) {
      const p = STATE.proyectos.filter(function (x) { return Number(x.id) === Number(id); })[0];
      return p ? p.nombre : ('#' + id);
    }

    function _d(v) { if (!v) return null; const d = new Date(String(v).slice(0, 10) + 'T00:00:00'); return isNaN(d.getTime()) ? null : d; }
    function _todayLocal() { const d = new Date(); d.setHours(0, 0, 0, 0); return d; }
    function _dayDiff(a, b) { return Math.round((b - a) / 86400000); }
    function _addMonth(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 1); }
    const MESES = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];

    function visibleTareas() {
      const fa = document.getElementById('fArea').value;
      const ft = document.getElementById('fTienda').value;
      const fs = document.getElementById('fSprint').value;
      return STATE.tareas.filter(function (t) {
        if (t.estado === 'Cancelada') return false;
        if (fa && t.area !== fa) return false;
        if (ft && t.tienda !== ft) return false;
        if (fs && Number(t.id_sprint) !== Number(fs)) return false;
        return true;
      });
    }

    function render() {
      const host = document.getElementById('ganttHost');
      const all = visibleTareas();

      // Solo tareas con fechas; las sin fecha quedan fuera del Gantt.
      const conFechas = [], sinFechasCount = [];
      all.forEach(function (t) {
        const ini = _d(t.fecha_inicio), lim = _d(t.fecha_limite);
        const start = ini || lim, end = lim || ini;
        if (start && end) { t._start = start <= end ? start : end; t._end = end >= start ? end : start; conFechas.push(t); }
        else sinFechasCount.push(t);
      });

      if (!conFechas.length) {
        host.innerHTML = '<div class="empty-row" style="padding:24px;text-align:center">Sin tareas con fechas para graficar.</div>';
        setStatus('statusBar', conFechas.length + ' tareas graficadas · ' + sinFechasCount.length + ' sin fechas (excluidas).', conFechas.length ? 'info' : 'warning');
        return;
      }

      // Rango completo (sin recortar tareas pasadas/vencidas): incluye siempre la fecha actual.
      const today = _todayLocal();
      let rangeStart = conFechas[0]._start, rangeEnd = conFechas[0]._end;
      conFechas.forEach(function (t) { if (t._start < rangeStart) rangeStart = t._start; if (t._end > rangeEnd) rangeEnd = t._end; });
      if (today < rangeStart) rangeStart = today;
      if (today > rangeEnd) rangeEnd = today;
      rangeStart = new Date(rangeStart.getTime() - 2 * 86400000);
      rangeEnd = new Date(rangeEnd.getTime() + 2 * 86400000);

      const px = PX[_zoom];
      const totalDays = _dayDiff(rangeStart, rangeEnd) + 1;
      const timelineW = totalDays * px;

      // Cabecera de meses.
      let axis = '', cur = new Date(rangeStart);
      while (cur <= rangeEnd) {
        const mEnd = new Date(cur.getFullYear(), cur.getMonth() + 1, 0);
        const segStart = cur > rangeStart ? cur : rangeStart;
        const segEnd = mEnd < rangeEnd ? mEnd : rangeEnd;
        const days = _dayDiff(segStart, segEnd) + 1;
        const w = days * px;
        const label = w >= 34 ? (MESES[cur.getMonth()] + ' ' + String(cur.getFullYear()).slice(2)) : '';
        axis += '<div class="gantt-month" style="width:' + w + 'px">' + label + '</div>';
        cur = _addMonth(cur);
      }

      // Línea de hoy, en su posición real dentro del rango.
      const todayLeft = _dayDiff(rangeStart, today) * px;
      const todayLine = '<div class="gantt-today" style="left:' + todayLeft + 'px"></div>';

      // Filas: label (izq) + barra (der), con las fechas reales (sin recortar tareas vencidas).
      let labels = '', lanes = '';
      conFechas.forEach(function (t) {
        const cls = ESTADO_CLASS[t.estado] || 'st-todo';
        const left = _dayDiff(rangeStart, t._start) * px;
        const width = Math.max(px, (_dayDiff(t._start, t._end) + 1) * px);
        const venc = t.vencida ? ' gantt-venc' : '';
        const sub = currentProyectoId() ? (t.responsable || '') : proyNombre(t.id_proyecto);
        labels += '<div class="gantt-rowlabel" style="cursor:pointer" title="' + escapeHtml(t.titulo) + '" onclick="openDetalle(' + t.id + ')">' +
          '<b>' + escapeHtml(t.titulo) + '</b>' + (sub ? '<span>' + escapeHtml(sub) + '</span>' : '') + '</div>';
        lanes += '<div class="gantt-lane">' +
          '<div class="gantt-bar badge ' + cls + venc + '" style="left:' + left + 'px;width:' + width + 'px;cursor:pointer" ' +
          'onclick="openDetalle(' + t.id + ')" ' +
          'title="' + escapeHtml(t.titulo + ' · ' + (t.fecha_inicio || '—').slice(0, 10) + ' → ' + (t.fecha_limite || '—').slice(0, 10)) + '">' +
          '<span class="gantt-bar-label">' + (t.avance_pct ? t.avance_pct + '%' : '') + '</span></div></div>';
      });

      host.innerHTML =
        '<div class="gantt">' +
          '<div class="gantt-left">' +
            '<div class="gantt-corner">Tarea</div>' + labels +
          '</div>' +
          '<div class="gantt-right">' +
            '<div class="gantt-canvas" style="width:' + timelineW + 'px">' +
              '<div class="gantt-axis">' + axis + '</div>' +
              '<div class="gantt-lanes">' + lanes + todayLine + '</div>' +
            '</div>' +
          '</div>' +
        '</div>';

      // Vista inicial: el área scrolleable arranca mostrando la fecha actual (sin recortar tareas anteriores).
      const rightPane = host.querySelector('.gantt-right');
      if (rightPane) rightPane.scrollLeft = Math.max(0, todayLeft - px);

      setStatus('statusBar', conFechas.length + ' tareas graficadas · ' + sinFechasCount.length + ' sin fechas (excluidas).', 'success');
    }

    function closeModal() { document.getElementById('modals').innerHTML = ''; }

    function openDetalle(id) {
      const t = STATE.tareas.filter(function (x) { return Number(x.id) === Number(id); })[0];
      if (!t) return;
      _actCtx = { entidad: 'TAREA', id: Number(id) };

      const cls  = ESTADO_CLASS[t.estado] || 'st-todo';
      const prc  = PRIORIDAD_CLASS[t.prioridad] || '';
      const pct  = Number(t.avance_pct) || 0;
      const venc = t.vencida ? '<span class="badge vencida" style="margin-left:4px">Vencida</span>' : '';

      const chips = [
        t.tipo        ? '<span class="badge" style="font-size:11px;background:var(--card2);border:1px solid var(--line);color:var(--text2)">' + escapeHtml(t.tipo) + '</span>' : '',
        t.prioridad   ? '<span class="badge ' + prc + '" style="font-size:11px">' + escapeHtml(t.prioridad) + '</span>' : '',
        t.responsable ? '<span style="font-size:12px;color:var(--muted)">👤 ' + escapeHtml(t.responsable) + '</span>' : '',
        t.area        ? '<span class="badge st-analysis" style="font-size:11px">' + escapeHtml(t.area) + '</span>' : '',
        t.tienda      ? '<span class="badge st-todo" style="font-size:11px">' + escapeHtml(t.tienda) + '</span>' : '',
        t.id_sprint   ? _sprintChip(t.id_sprint, '11px') : '',
      ].filter(Boolean).join('');

      const metaParts = [
        '<div class="avance-bar">' +
          '<div class="avance-track" style="width:80px"><div class="avance-fill" style="width:' + pct + '%"></div></div>' +
          '<span class="mono" style="font-size:12px;color:var(--muted)">' + pct + '% avance</span>' +
        '</div>',
        t.fecha_inicio ? '<span style="font-size:12px;color:var(--muted)">Inicio: <b>' + fmtDate(t.fecha_inicio) + '</b></span>' : '',
        t.fecha_limite ? '<span style="font-size:12px;color:var(--muted)">Vence: <b>' + fmtDate(t.fecha_limite) + '</b></span>' : '',
      ].filter(Boolean).join('');

      const extLinks = [
        { url: t.url_jira,            label: 'Jira' },
        { url: t.url_gitlab,          label: 'GitLab' },
        { url: t.url_figma_prototipo, label: 'Figma proto' },
        { url: t.url_figma_editable,  label: 'Figma edit' },
      ].filter(function (l) { return l.url; }).map(function (l) {
        return '<a class="link-chip" href="' + escapeHtml(l.url) + '" target="_blank" rel="noopener">↗ ' + escapeHtml(l.label) + '</a>';
      }).join('');

      document.getElementById('modals').innerHTML =
        '<div class="modal-overlay"><div class="modal td-modal">' +
        '<div class="td-header-top">' +
          '<span class="badge ' + cls + '">' + escapeHtml(t.estado) + '</span>' + venc +
          '<div class="td-header-actions">' +
            '<button class="secondary sm" onclick="closeModal()">✕</button>' +
          '</div>' +
        '</div>' +
        '<h3 class="td-title">' + escapeHtml(t.titulo) + '</h3>' +
        (chips ? '<div class="td-chips">' + chips + '</div>' : '') +
        '<div class="td-meta">' + metaParts + '</div>' +
        (t.descripcion ? '<div class="td-desc">' + escapeHtml(t.descripcion) + '</div>' : '') +
        (extLinks ? '<div class="link-row" style="margin-bottom:12px">' + extLinks + '</div>' : '') +
        '<hr class="td-sep" />' +
        '<div class="act-tabs">' +
          '<button class="act-tab active" id="act-tab-com" onclick="_actShow(\'com\')">Comentarios</button>' +
          '<button class="act-tab" id="act-tab-chk" onclick="_actShow(\'chk\')">Checklist</button>' +
          '<button class="act-tab" id="act-tab-adj" onclick="_actShow(\'adj\')">Adjuntos</button>' +
          '<button class="act-tab" id="act-tab-his" onclick="_actShow(\'his\')">Historial</button>' +
        '</div>' +
        '<div id="act-com">' +
          '<div class="field" style="margin-top:12px"><textarea id="act-input" placeholder="Escribí un comentario…"></textarea></div>' +
          '<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button id="act-send" class="sm" onclick="_actSend()">Comentar</button></div>' +
          '<div id="act-com-list"><div class="text-muted" style="font-size:13px">Cargando…</div></div>' +
        '</div>' +
        '<div id="act-chk" hidden>' +
          '<div id="act-chk-progress" class="chk-progress" style="margin-top:12px"></div>' +
          '<div id="act-chk-list" style="margin:8px 0"><div class="text-muted" style="font-size:13px">Cargando…</div></div>' +
          '<div class="field" style="display:flex;gap:8px;align-items:center">' +
            '<input id="act-chk-input" placeholder="Nuevo ítem…" class="admin-only" style="flex:1" onkeydown="if(event.key===\'Enter\'){event.preventDefault();_actAddChecklist();}" />' +
            '<button id="act-chk-add" class="sm admin-only" onclick="_actAddChecklist()">Agregar</button>' +
          '</div>' +
        '</div>' +
        '<div id="act-adj" hidden>' +
          '<div style="display:flex;align-items:center;gap:10px;margin:12px 0">' +
            '<input type="file" id="act-file" accept="image/*" multiple style="font-size:12px" />' +
            '<span id="act-upstatus" class="text-muted" style="font-size:12px"></span>' +
          '</div>' +
          '<div id="act-adj-list" class="adj-grid"><div class="text-muted" style="font-size:13px">Cargando…</div></div>' +
        '</div>' +
        '<div id="act-his" hidden><div id="act-his-list" style="margin-top:12px"><div class="text-muted" style="font-size:13px">Cargando…</div></div></div>' +
        '<div class="modal-actions"><button class="secondary" onclick="closeModal()">Cerrar</button></div>' +
        '</div></div>';

      const fi = document.getElementById('act-file');
      if (fi) fi.addEventListener('change', _actUpload);
      restrictWriteIfAgent();
      _actLoadComentarios();
      _actLoadChecklist();
      _actLoadAdjuntos();
      _actLoadHistorial();
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });

    document.addEventListener('DOMContentLoaded', function () {
      initTheme(); initVersionBadge(); requireAuth(); renderSidebarUser(); initSidebarCollapse(); restrictWriteIfAgent(); init();
    });
  </script>
</body>
