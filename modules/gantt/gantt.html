    <div class="content-area">
      <div class="topbar">
        <button class="topbar-toggle" id="sidebarCollapseBtn" type="button" aria-pressed="false" title="Ocultar menú lateral" aria-label="Mostrar u ocultar menú lateral"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="1.5" y="2.5" width="13" height="11" rx="2"/><line x1="6" y1="2.5" x2="6" y2="13.5"/></svg></button>

        <div class="topbar-actions"></div>
      </div>

      <main class="container">
        <div class="page-header">
          <h1>Gantt</h1>
        </div>
        <section class="panel">
          <div class="toolbar toolbar-gantt">
            <div class="field">
              <label for="selProyecto">Proyecto</label>
              <select id="selProyecto" onchange="loadTareas()" style="max-width:300px"></select>
            </div>
            <div class="field">
              <label for="fArea">Área</label>
              <select id="fArea" onchange="render()" style="max-width:150px"><option value="">Todas las áreas</option></select>
            </div>
            <div class="field">
              <label for="fTienda">Tienda</label>
              <select id="fTienda" onchange="render()" style="max-width:150px"><option value="">Todas las tiendas</option></select>
            </div>
            <div class="field">
              <label for="fSprint">Sprint</label>
              <select id="fSprint" onchange="loadTareas()" style="max-width:170px"><option value="">Todos los sprints</option></select>
            </div>
            <span class="spacer"></span>
            <div class="seg-toggle">
              <button class="seg-tab active" id="zoomMes" onclick="setZoom('mes')">Mes</button>
              <button class="seg-tab" id="zoomSemana" onclick="setZoom('semana')">Semana</button>
            </div>
          </div>
          <div id="statusBar" class="status-bar">Cargando…</div>
          <div id="sinFechasLink" style="margin-top:6px"></div>
          <div id="ganttHost" style="margin-top:12px"></div>
        </section>
      </main>

  <div id="modals"></div>

  <script src="../../config.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../api.js"></script>
  <script src="../../actividad.js"></script>
  <script src="../../tareaDetalle.js"></script>
  <script>
    const PX = { mes: 5, semana: 22 };   // px por día según zoom
    let _zoom = 'mes';

    function qsProyecto() { const m = location.search.match(/[?&]proyecto=(\d+)/); return m ? Number(m[1]) : null; }
    function currentProyectoId() { const v = document.getElementById('selProyecto').value; return v === '' ? null : Number(v); }

    async function init() {
      setStatus('statusBar', 'Cargando…', 'info');
      try {
        await loadCatalogos();
        STATE.proyectos = await apiGetProyectos({});
        const sel = document.getElementById('selProyecto');
        sel.innerHTML = '<option value="">Todos los proyectos</option>' +
          STATE.proyectos.map(function (p) { return '<option value="' + p.id + '">' + escapeHtml(p.nombre) + '</option>'; }).join('');
        const pre = qsProyecto();
        if (pre && STATE.proyectos.some(function (p) { return Number(p.id) === pre; })) sel.value = pre;

        document.getElementById('fArea').innerHTML = '<option value="">Todas las áreas</option>' + cat('areas', AREAS).map(function (a) { return '<option>' + a + '</option>'; }).join('');
        document.getElementById('fTienda').innerHTML = '<option value="">Todas las tiendas</option>' + cat('tiendas', TIENDAS).map(function (t) { return '<option>' + t + '</option>'; }).join('');

        STATE.sprints = await apiGetSprints({});
        document.getElementById('fSprint').innerHTML = '<option value="">Todos los sprints</option>' +
          STATE.sprints.map(function (s) { return '<option value="' + s.id + '">' + escapeHtml(s.nombre) + '</option>'; }).join('');

        await loadTareas();
      } catch (err) { setStatus('statusBar', 'Error: ' + err.message, 'error'); }
    }

    function _sprintById(id) {
      if (!id) return null;
      return (STATE.sprints || []).filter(function (s) { return Number(s.id) === Number(id); })[0] || null;
    }

    function _sprintChip(id, fontSize) {
      const s = _sprintById(id);
      if (!s) return '';
      const cls = ESTADO_CLASS_SPRINT[s.estado] || 'st-todo';
      return '<span class="badge ' + cls + '" style="font-size:' + (fontSize || '11px') + '">' + escapeHtml(s.nombre) + '</span>';
    }

    async function loadTareas() {
      setStatus('statusBar', 'Cargando…', 'info');
      try {
        const pid = currentProyectoId();
        const fs = document.getElementById('fSprint').value;
        const params = {};
        if (pid) params.id_proyecto = pid;
        if (fs) params.id_sprint = fs;
        STATE.tareas = await apiGetTareas(params);
        render();
      } catch (err) { setStatus('statusBar', 'Error: ' + err.message, 'error'); }
    }

    function setZoom(z) {
      _zoom = z;
      document.getElementById('zoomMes').classList.toggle('active', z === 'mes');
      document.getElementById('zoomSemana').classList.toggle('active', z === 'semana');
      render();
    }

    function proyNombre(id) {
      const p = STATE.proyectos.filter(function (x) { return Number(x.id) === Number(id); })[0];
      return p ? p.nombre : ('#' + id);
    }

    function _d(v) { if (!v) return null; const d = new Date(String(v).slice(0, 10) + 'T00:00:00'); return isNaN(d.getTime()) ? null : d; }
    function _todayLocal() { const d = new Date(); d.setHours(0, 0, 0, 0); return d; }
    function _dayDiff(a, b) { return Math.round((b - a) / 86400000); }
    function _addMonth(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 1); }
    const MESES = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];

    // Área/tienda se filtran en cliente (sin soporte server-side); proyecto/sprint y
    // exclusión de canceladas ya vienen resueltos por el backend en loadTareas().
    function visibleTareas() {
      const fa = document.getElementById('fArea').value;
      const ft = document.getElementById('fTienda').value;
      return STATE.tareas.filter(function (t) {
        if (fa && t.area !== fa) return false;
        if (ft && t.tienda !== ft) return false;
        return true;
      });
    }

    function render() {
      const host = document.getElementById('ganttHost');
      const all = visibleTareas();

      // Solo tareas con fechas; las sin fecha quedan fuera del Gantt.
      const conFechas = [], sinFechasCount = [];
      all.forEach(function (t) {
        const ini = _d(t.fecha_inicio), lim = _d(t.fecha_limite);
        const start = ini || lim, end = lim || ini;
        if (start && end) { t._start = start <= end ? start : end; t._end = end >= start ? end : start; conFechas.push(t); }
        else sinFechasCount.push(t);
      });

      renderSinFechasLink(sinFechasCount.length);

      if (!conFechas.length) {
        host.innerHTML = '<div class="empty-row" style="padding:24px;text-align:center">Sin tareas con fechas para graficar.</div>';
        setStatus('statusBar', conFechas.length + ' tareas graficadas · ' + sinFechasCount.length + ' sin fechas (excluidas).', conFechas.length ? 'info' : 'warning');
        return;
      }

      // Rango completo (sin recortar tareas pasadas/vencidas): incluye siempre la fecha actual.
      const today = _todayLocal();
      let rangeStart = conFechas[0]._start, rangeEnd = conFechas[0]._end;
      conFechas.forEach(function (t) { if (t._start < rangeStart) rangeStart = t._start; if (t._end > rangeEnd) rangeEnd = t._end; });
      if (today < rangeStart) rangeStart = today;
      if (today > rangeEnd) rangeEnd = today;
      rangeStart = new Date(rangeStart.getTime() - 2 * 86400000);
      rangeEnd = new Date(rangeEnd.getTime() + 2 * 86400000);

      const px = PX[_zoom];
      const totalDays = _dayDiff(rangeStart, rangeEnd) + 1;
      const timelineW = totalDays * px;

      // Cabecera de meses + columnas de grilla (mismos anchos, alineadas bajo el eje).
      let axis = '', grid = '', cur = new Date(rangeStart);
      while (cur <= rangeEnd) {
        const mEnd = new Date(cur.getFullYear(), cur.getMonth() + 1, 0);
        const segStart = cur > rangeStart ? cur : rangeStart;
        const segEnd = mEnd < rangeEnd ? mEnd : rangeEnd;
        const days = _dayDiff(segStart, segEnd) + 1;
        const w = days * px;
        const label = w >= 34 ? (MESES[cur.getMonth()] + ' ' + String(cur.getFullYear()).slice(2)) : '';
        axis += '<div class="gantt-month" style="width:' + w + 'px">' + label + '</div>';
        grid += '<div class="gantt-gridcol" style="width:' + w + 'px"></div>';
        cur = _addMonth(cur);
      }

      // Línea de hoy, en su posición real dentro del rango, con banderín.
      const todayLeft = _dayDiff(rangeStart, today) * px;
      const todayLine = '<div class="gantt-today" style="left:' + todayLeft + 'px"><span class="gantt-today-flag">Hoy</span></div>';

      // Filas: label (izq) + barra (der), con las fechas reales (sin recortar tareas vencidas).
      let labels = '', lanes = '';
      conFechas.forEach(function (t, i) {
        const cls = ESTADO_CLASS[t.estado] || 'st-todo';
        const alt = (i % 2) ? ' gantt-alt' : '';
        const left = _dayDiff(rangeStart, t._start) * px;
        const width = Math.max(px, (_dayDiff(t._start, t._end) + 1) * px);
        const venc = t.vencida ? ' gantt-venc' : '';
        const pct = Math.max(0, Math.min(100, Number(t.avance_pct) || 0));
        const sub = currentProyectoId() ? (t.responsable || '') : proyNombre(t.id_proyecto);
        const openAttrs = 'role="button" tabindex="0" onclick="openDetalle(' + t.id + ')" ' +
          'onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();openDetalle(' + t.id + ');}"';
        labels += '<div class="gantt-rowlabel' + alt + '" style="cursor:pointer" title="' + escapeHtml(t.titulo) + '" ' + openAttrs + '>' +
          '<b>' + escapeHtml(t.titulo) + '</b>' + (sub ? '<span>' + escapeHtml(sub) + '</span>' : '') + '</div>';
        lanes += '<div class="gantt-lane' + alt + '">' +
          '<div class="gantt-bar ' + cls + venc + '" style="left:' + left + 'px;width:' + width + 'px" ' +
          openAttrs + ' ' +
          'title="' + escapeHtml(t.titulo + ' · ' + (t.fecha_inicio || '—').slice(0, 10) + ' → ' + (t.fecha_limite || '—').slice(0, 10) + (pct ? ' · ' + pct + '%' : '')) + '">' +
          (pct ? '<div class="gantt-bar-fill" style="width:' + pct + '%"></div>' : '') +
          '<span class="gantt-bar-label">' + (pct ? pct + '%' : '') + '</span></div></div>';
      });

      host.innerHTML =
        '<div class="gantt">' +
          '<div class="gantt-left">' +
            '<div class="gantt-corner">Tarea</div>' + labels +
          '</div>' +
          '<div class="gantt-right">' +
            '<div class="gantt-canvas" style="width:' + timelineW + 'px">' +
              '<div class="gantt-axis">' + axis + '</div>' +
              '<div class="gantt-lanes"><div class="gantt-grid">' + grid + '</div>' + lanes + todayLine + '</div>' +
            '</div>' +
          '</div>' +
        '</div>';

      // Vista inicial: el área scrolleable arranca mostrando la fecha actual (sin recortar tareas anteriores).
      const rightPane = host.querySelector('.gantt-right');
      if (rightPane) rightPane.scrollLeft = Math.max(0, todayLeft - px);

      setStatus('statusBar', conFechas.length + ' tareas graficadas · ' + sinFechasCount.length + ' sin fechas (excluidas).', 'success');
    }

    // Tareas sin fecha quedan fuera del gráfico; este link da una salida rápida a Tareas para completarlas.
    function renderSinFechasLink(count) {
      const host = document.getElementById('sinFechasLink');
      if (!count) { host.innerHTML = ''; return; }
      const pid = currentProyectoId();
      const href = '../tareas/tareas.html' + (pid ? '?proyecto=' + pid : '');
      host.innerHTML = '<a href="' + href + '" style="font-size:12px;color:var(--primary)">' +
        count + ' tarea' + (count === 1 ? '' : 's') + ' sin fecha — completarlas en Tareas →</a>';
    }

    function closeModal() { document.getElementById('modals').innerHTML = ''; }

    function openDetalle(id) {
      const t = STATE.tareas.filter(function (x) { return Number(x.id) === Number(id); })[0];
      if (!t) return;
      t.nombre_proyecto = proyNombre(t.id_proyecto);
      openTareaDetalleModal(t, { onEdit: null });
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });

    document.addEventListener('DOMContentLoaded', function () {
      initTheme(); initVersionBadge(); requireAuth(); renderSidebarUser(); initSidebarCollapse(); restrictWriteIfAgent(); init();
    });
  </script>
</body>
